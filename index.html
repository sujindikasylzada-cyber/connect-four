<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Connect Four</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-multiplayer.js"></script>
  <style>
    :root{
      --font-display:'Syne',sans-serif;
      --font-body:'Outfit',sans-serif;
      --font-mono:'JetBrains Mono',monospace;
      --col-bg:#06080f;--col-bg2:#0c1120;
      --col-surface:rgba(255,255,255,0.04);
      --col-surface-high:rgba(255,255,255,0.07);
      --col-glass:rgba(12,17,32,0.75);
      --col-border:rgba(255,255,255,0.08);
      --col-border-hi:rgba(255,255,255,0.15);
      --col-p1:#ff3d6b;--col-p1-glow:rgba(255,61,107,0.3);
      --col-p2:#fbbf24;--col-p2-glow:rgba(251,191,36,0.3);
      --col-bot:#a78bfa;--col-bot-glow:rgba(167,139,250,0.3);
      --col-accent:#38bdf8;--col-accent-glow:rgba(56,189,248,0.15);
      --col-board:#0d1b36;--col-board-rim:#162444;--col-hole:#050c1a;
      --col-text:#f0f4ff;
      --col-text-muted:rgba(240,244,255,0.45);
      --col-text-dim:rgba(240,244,255,0.25);
      --col-success:#34d399;--col-danger:#f87171;--col-timer:#fbbf24;
      --radius-sm:8px;--radius-md:14px;--radius-lg:22px;--radius-xl:32px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{min-height:100vh;background:var(--col-bg);color:var(--col-text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--col-border-hi);border-radius:4px;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(circle,rgba(255,255,255,0.045) 1px,transparent 1px);
      background-size:28px 28px;}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(255,61,107,0.07) 0%,transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 75%,rgba(167,139,250,0.07) 0%,transparent 70%),
        radial-gradient(ellipse 40% 30% at 55% 50%,rgba(56,189,248,0.04) 0%,transparent 70%);}
    #root{position:relative;z-index:1;}
    input[type=text],input[type=number]{background:var(--col-surface-high);border:1px solid var(--col-border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--col-text);font-family:var(--font-body);font-size:15px;font-weight:500;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
    input[type=text]:focus,input[type=number]:focus{border-color:var(--col-accent);box-shadow:0 0 0 3px var(--col-accent-glow);}
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--col-border-hi);border-radius:2px;outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--col-accent);box-shadow:0 0 8px var(--col-accent);cursor:pointer;transition:transform .15s;}
    input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
    label{color:var(--col-text-muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:8px;}
    button{font-family:var(--font-body);cursor:pointer;}
    button:active:not(:disabled){transform:scale(0.96)!important;}

    /* ── Responsive Desktop Grid ──────────────────────────────── */
    .game-layout{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px 12px 32px;
      position:relative;
    }
    .game-inner{
      width:100%;
      max-width:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }
    /* left / right side panels — hidden on mobile */
    .side-panel{display:none;}
    .desktop-nav-lb-btn{display:inline-flex;}

    @media(min-width:1024px){
      .game-layout{
        display:grid;
        grid-template-rows:auto 1fr;
        grid-template-columns:1fr minmax(0,560px) 1fr;
        grid-template-areas:
          "topbar topbar topbar"
          "left   center right";
        align-items:start;
        padding:24px 28px 40px;
        gap:0 24px;
        max-width:1440px;
        margin:0 auto;
      }
      .game-topbar{
        grid-area:topbar;
        width:100%;
        display:flex;
        align-items:center;
        justify-content:flex-start;
        gap:16px;
        margin-bottom:28px;
        padding:0 4px;
      }
      .game-inner{
        grid-area:center;
        max-width:100%;
        width:100%;
      }
      .side-panel{
        display:flex;
        flex-direction:column;
        gap:16px;
        position:sticky;
        top:24px;
        align-self:start;
      }
      .side-panel-left{grid-area:left;}
      .side-panel-right{grid-area:right;}
      /* hide the 🏆 Board modal button on desktop — leaderboard is inline */
      .desktop-nav-lb-btn{display:none;}
    }

    /* ── Keyframes ───────────────────────────────────────────── */
    @keyframes dropIn{0%{transform:translateY(-340%) scaleX(0.9);opacity:0;}65%{transform:translateY(6%) scaleX(1.04);opacity:1;}82%{transform:translateY(-3%) scaleX(0.98);}100%{transform:translateY(0) scaleX(1);opacity:1;}}
    @keyframes winPulse{0%,100%{box-shadow:0 0 0 2px #fff,0 0 18px currentColor,0 0 40px currentColor;}50%{box-shadow:0 0 0 4px #fff,0 0 30px currentColor,0 0 60px currentColor;}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
    @keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
    @keyframes advisorPing{0%{transform:scale(1);opacity:1;}60%{transform:scale(2.2);opacity:0;}100%{transform:scale(1);opacity:0;}}
    @keyframes timerFlash{0%,100%{opacity:1;}50%{opacity:.2;}}
    @keyframes colHoverBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
    @keyframes statReveal{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
    @keyframes difficultyAppear{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes proGlow{0%,100%{box-shadow:0 0 8px #f59e0b55,0 0 16px #f59e0b22;}50%{box-shadow:0 0 16px #f59e0b99,0 0 32px #f59e0b44;}}
    @keyframes lockBounce{0%,100%{transform:scale(1);}40%{transform:scale(1.15);}70%{transform:scale(0.95);}}
    @keyframes shopSlideIn{from{opacity:0;transform:translateY(16px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes lbRowIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const {useState,useEffect,useRef,useCallback}=React;

  /* ════════════════════════════════════════════
     DESIGN TOKEN BRIDGE
  ═════════════════════════════════════════════*/
  const T={
    p1:'var(--col-p1)',p1Glow:'var(--col-p1-glow)',
    p2:'var(--col-p2)',p2Glow:'var(--col-p2-glow)',
    bot:'var(--col-bot)',botGlow:'var(--col-bot-glow)',
    accent:'var(--col-accent)',accentG:'var(--col-accent-glow)',
    success:'var(--col-success)',danger:'var(--col-danger)',timer:'var(--col-timer)',
    text:'var(--col-text)',muted:'var(--col-text-muted)',dim:'var(--col-text-dim)',
    surface:'var(--col-surface)',surfaceH:'var(--col-surface-high)',
    glass:'var(--col-glass)',border:'var(--col-border)',borderHi:'var(--col-border-hi)',
    board:'var(--col-board)',boardRim:'var(--col-board-rim)',
  };

  /* ════════════════════════════════════════════
     RESPONSIVE HOOK
  ═════════════════════════════════════════════*/
  function useDesktop(){
    const [desk,setDesk]=useState(()=>typeof window!=='undefined'&&window.innerWidth>=1024);
    useEffect(()=>{
      const fn=()=>setDesk(window.innerWidth>=1024);
      window.addEventListener('resize',fn);
      return()=>window.removeEventListener('resize',fn);
    },[]);
    return desk;
  }

  /* ════════════════════════════════════════════
     CONSTANTS
  ═════════════════════════════════════════════*/
  const ROWS=6,COLS=7,EMPTY=null,P1='P1',P2='P2',BOT='BOT';
  const MODE_BOT=1,MODE_LOCAL=2,MODE_ONLINE=3;
  const STORAGE_KEY='c4_game_state',LB_KEY='c4_leaderboard_v2',SHOP_KEY='c4_shop_v1';
  const DEFAULT_TIMER=15;
  const FB=C4Firebase;

  /* ════════════════════════════════════════════
     DIFFICULTIES
  ═════════════════════════════════════════════*/
  const DIFFICULTIES=[
    {id:'easy',label:'Easy',emoji:'🟢',desc:'Plays mostly random',color:'#34d399'},
    {id:'medium',label:'Medium',emoji:'🟡',desc:'Blocks & wins only',color:'#fbbf24'},
    {id:'hard',label:'Hard',emoji:'🟠',desc:'Heuristic strategy',color:'#f97316'},
    {id:'master',label:'Master',emoji:'🔴',desc:'Minimax + Alpha-Beta',color:'#f87171'},
  ];

  /* ════════════════════════════════════════════
     SHOP CATALOG
  ═════════════════════════════════════════════*/
  const PIECE_SHAPES=[
    {id:'classic',label:'Classic Sphere',emoji:'⚪',desc:'Neon spheres',pro:false},
    {id:'bricks',label:'Retro Bricks',emoji:'🟥',desc:'Square arcade blocks',pro:false},
    {id:'hearts',label:'Glowing Hearts',emoji:'❤️',desc:'Smooth SVG hearts',pro:true},
    {id:'stars',label:'Neon Stars',emoji:'⭐',desc:'Sharp neon stars',pro:true},
  ];
  const PLAYER_COLORS=[
    {id:'rose',label:'Rose Neon',hex:'#ff3d6b'},{id:'cyan',label:'Cyber Cyan',hex:'#22d3ee'},
    {id:'green',label:'Matrix Green',hex:'#4ade80'},{id:'purple',label:'Vivid Purple',hex:'#c084fc'},
    {id:'orange',label:'Blaze Orange',hex:'#fb923c'},{id:'gold',label:'Solar Gold',hex:'#fbbf24'},
    {id:'white',label:'Ghost White',hex:'#e2e8f0'},{id:'pink',label:'Hyper Pink',hex:'#f472b6'},
  ];
  const BOARD_THEMES=[
    {id:'deepcyber',label:'Deep Cyber',emoji:'🌌',desc:'Dark blue hi-tech',bg:'linear-gradient(160deg,#0e1f3d 0%,#091628 100%)',rim:'#162444',pro:false},
    {id:'carbonretro',label:'Carbon Retro',emoji:'🖤',desc:'Gritty arcade plastic',bg:'linear-gradient(160deg,#1a1a1a 0%,#0d0d0d 100%)',rim:'#333',pro:false},
    {id:'neongenesis',label:'Neon Genesis',emoji:'💜',desc:'Blazing magenta/cyan',bg:'linear-gradient(160deg,#1a0533 0%,#0d0820 100%)',rim:'#c026d3',pro:true},
    {id:'goldenroyal',label:'Golden Royal',emoji:'👑',desc:'Luxury gold frame',bg:'linear-gradient(160deg,#1c1400 0%,#0f0c00 100%)',rim:'#a16207',pro:true},
  ];

  /* ════════════════════════════════════════════
     SHOP STATE HELPERS
  ═════════════════════════════════════════════*/
  function loadShop(){try{return JSON.parse(localStorage.getItem(SHOP_KEY))||{};}catch{return{};}}
  function saveShop(s){localStorage.setItem(SHOP_KEY,JSON.stringify(s));}
  function getShopDefaults(){return{proUnlocked:false,pieceShape:'classic',p1Color:'#ff3d6b',p2Color:'#fbbf24',boardTheme:'deepcyber'};}
  function loadShopState(){return{...getShopDefaults(),...loadShop()};}

  /* ════════════════════════════════════════════
     BOARD HELPERS
  ═════════════════════════════════════════════*/
  const makeBoard=()=>Array(ROWS).fill(null).map(()=>Array(COLS).fill(EMPTY));
  function dropPiece(board,col,player){
    const next=board.map(r=>[...r]);
    for(let r=ROWS-1;r>=0;r--){if(next[r][col]===EMPTY){next[r][col]=player;return next;}}
    return null;
  }
  function getDropRow(board,col){for(let r=ROWS-1;r>=0;r--)if(board[r][col]===EMPTY)return r;return -1;}
  function checkWinner(board){
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const p=board[r][c];if(!p)continue;
      for(const[dr,dc]of dirs){
        let cells=[[r,c]];
        for(let i=1;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p)break;cells.push([nr,nc]);}
        if(cells.length===4)return{winner:p,cells};
      }
    }
    return null;
  }
  function isDraw(board){return board[0].every(c=>c!==EMPTY);}
  function isValidCol(board,col){return col>=0&&col<COLS&&board[0][col]===EMPTY;}
  function getValidCols(board){return[3,2,4,1,5,0,6].filter(c=>isValidCol(board,c));}

  /* ════════════════════════════════════════════
     HEURISTIC SCORING
  ═════════════════════════════════════════════*/
  function scoreWindow(win,player,opp){
    const p=win.filter(c=>c===player).length,e=win.filter(c=>c===EMPTY).length,o=win.filter(c=>c===opp).length;
    if(o>0)return 0;if(p===4)return 100;if(p===3&&e===1)return 5;if(p===2&&e===2)return 2;return 0;
  }
  function scoreBoard(board,player){
    const opp=player===P1?P2:P1;let score=0;
    const cc=Math.floor(COLS/2);
    score+=board.map(r=>r[cc]).filter(c=>c===player).length*3;
    for(let r=0;r<ROWS;r++)for(let c=0;c<=COLS-4;c++)score+=scoreWindow(board[r].slice(c,c+4),player,opp);
    for(let c=0;c<COLS;c++)for(let r=0;r<=ROWS-4;r++)score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c]),player,opp);
    for(let r=0;r<=ROWS-4;r++)for(let c=0;c<=COLS-4;c++){
      score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c+i]),player,opp);
      score+=scoreWindow([0,1,2,3].map(i=>board[r+3-i][c+i]),player,opp);
    }
    return score;
  }

  /* ════════════════════════════════════════════
     MINIMAX WITH ALPHA-BETA PRUNING
  ═════════════════════════════════════════════*/
  function minimax(board,depth,alpha,beta,isMax,botPlayer){
    const opp=botPlayer===P1?P2:P1;
    const win=checkWinner(board);
    if(win)return win.winner===botPlayer?100000+depth:-(100000+depth);
    if(isDraw(board)||depth===0)return scoreBoard(board,botPlayer)-scoreBoard(board,opp);
    const cols=getValidCols(board);
    if(isMax){
      let best=-Infinity;
      for(const c of cols){const n=dropPiece(board,c,botPlayer);best=Math.max(best,minimax(n,depth-1,alpha,beta,false,botPlayer));alpha=Math.max(alpha,best);if(alpha>=beta)break;}
      return best;
    }else{
      let best=Infinity;
      for(const c of cols){const n=dropPiece(board,c,opp);best=Math.min(best,minimax(n,depth-1,alpha,beta,true,botPlayer));beta=Math.min(beta,best);if(alpha>=beta)break;}
      return best;
    }
  }
  function getBotMoveMaster(board,botPlayer){
    const cols=getValidCols(board);let best=-Infinity,bestCol=cols[0];
    for(const c of cols){const n=dropPiece(board,c,botPlayer);const s=minimax(n,6,-Infinity,Infinity,false,botPlayer);if(s>best){best=s;bestCol=c;}}
    return bestCol;
  }

  /* ════════════════════════════════════════════
     BOT DISPATCHER
  ═════════════════════════════════════════════*/
  function getBotMove(board,botPlayer,difficulty='hard'){
    const opp=botPlayer===P1?P2:P1;
    const cols=getValidCols(board);
    if(!cols.length)return 3;
    const rand=()=>cols[Math.floor(Math.random()*cols.length)];
    if(difficulty==='easy'){
      if(Math.random()<0.8)return rand();
      for(const c of cols){const n=dropPiece(board,c,botPlayer);if(n&&checkWinner(n))return c;}
      for(const c of cols){const n=dropPiece(board,c,opp);if(n&&checkWinner(n))return c;}
      return rand();
    }
    if(difficulty==='medium'){
      for(const c of cols){const n=dropPiece(board,c,botPlayer);if(n&&checkWinner(n))return c;}
      for(const c of cols){const n=dropPiece(board,c,opp);if(n&&checkWinner(n))return c;}
      return rand();
    }
    if(difficulty==='hard'){
      for(const c of cols){const n=dropPiece(board,c,botPlayer);if(n&&checkWinner(n))return c;}
      for(const c of cols){const n=dropPiece(board,c,opp);if(n&&checkWinner(n))return c;}
      let best=-Infinity,bestCol=cols[0];
      for(const c of cols){const n=dropPiece(board,c,botPlayer);if(!n)continue;const s=scoreBoard(n,botPlayer)-scoreBoard(n,opp)*0.8;if(s>best){best=s;bestCol=c;}}
      return bestCol;
    }
    if(difficulty==='master')return getBotMoveMaster(board,botPlayer);
    return rand();
  }
  const getAdvisorCol=(board,player)=>getBotMove(board,player,'hard');

  /* ════════════════════════════════════════════
     LEADERBOARD HELPERS
  ═════════════════════════════════════════════*/
  function loadLB(){try{return JSON.parse(localStorage.getItem(LB_KEY))||{};}catch{return{};}}
  function saveLB(lb){localStorage.setItem(LB_KEY,JSON.stringify(lb));}
  function ensurePlayer(lb,name){if(!lb[name])lb[name]={wins:0,losses:0,draws:0,totalGames:0};}
  function recordGameResult(winnerName,loserName,draw,p1Name,p2Name){
    const lb=loadLB();
    if(draw){[p1Name,p2Name].forEach(n=>{if(!n)return;ensurePlayer(lb,n);lb[n].draws++;lb[n].totalGames++;});}
    else{
      if(winnerName){ensurePlayer(lb,winnerName);lb[winnerName].wins++;lb[winnerName].totalGames++;}
      if(loserName){ensurePlayer(lb,loserName);lb[loserName].losses++;lb[loserName].totalGames++;}
    }
    saveLB(lb);
  }
  function winRate(s){return s.totalGames?(s.wins/s.totalGames)*100:0;}
  function sortedLeaderboard(){
    return Object.entries(loadLB()).map(([name,s])=>({name,...s,winRate:winRate(s)}))
      .sort((a,b)=>Math.abs(b.winRate-a.winRate)>0.01?b.winRate-a.winRate:b.totalGames-a.totalGames);
  }

  /* ════════════════════════════════════════════
     COLOR HELPERS
  ═════════════════════════════════════════════*/
  const playerGlowHex=hex=>`${hex}55`;
  const playerColorRaw=(p,shopState)=>{
    if(!shopState)return p===P1?'#ff3d6b':p===BOT?'#a78bfa':'#fbbf24';
    if(p===P1)return shopState.p1Color||'#ff3d6b';
    if(p===P2)return shopState.p2Color||'#fbbf24';
    return '#a78bfa';
  };

  /* ════════════════════════════════════════════
     SVG PIECES
  ═════════════════════════════════════════════*/
  function HeartSVG({col,glow,size}){
    return(<svg viewBox="0 0 100 90" style={{width:size||'100%',height:size||'100%',filter:`drop-shadow(0 0 6px ${col}) drop-shadow(0 0 14px ${glow})`}}>
      <path d="M50 80 C50 80 10 52 10 28 C10 14 20 6 32 6 C40 6 46 10 50 16 C54 10 60 6 68 6 C80 6 90 14 90 28 C90 52 50 80 50 80Z" fill={col}/>
      <ellipse cx="36" cy="22" rx="8" ry="5" fill="rgba(255,255,255,0.3)" transform="rotate(-30 36 22)"/>
    </svg>);
  }
  function StarSVG({col,glow,size}){
    return(<svg viewBox="0 0 100 100" style={{width:size||'100%',height:size||'100%',filter:`drop-shadow(0 0 6px ${col}) drop-shadow(0 0 16px ${glow})`}}>
      <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill={col}/>
      <polygon points="50,18 57,36 76,36 62,47 67,66 50,55 33,66 38,47 24,36 43,36" fill="rgba(255,255,255,0.22)"/>
    </svg>);
  }

  /* ════════════════════════════════════════════
     PIECE COMPONENT
  ═════════════════════════════════════════════*/
  function Piece({player,isNew,isWinner,shopState}){
    const shape=shopState?shopState.pieceShape:'classic';
    if(!player){
      return(<div style={{width:'100%',aspectRatio:'1',borderRadius:shape==='bricks'?'25%':'50%',background:'var(--col-hole)',boxShadow:'inset 0 3px 10px rgba(0,0,0,0.8),inset 0 1px 3px rgba(0,0,0,0.9)',border:'1px solid rgba(0,0,0,0.5)'}}/>);
    }
    const col=playerColorRaw(player,shopState);
    const glow=playerGlowHex(col);
    const anim=isNew?{animation:'dropIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards',transformOrigin:'top center'}
               :isWinner?{animation:'winPulse 0.9s ease-in-out infinite'}:{};
    const winShadow=`inset 0 -3px 8px rgba(0,0,0,0.4),0 0 20px ${col},0 0 45px ${glow}`;
    const normShadow=`inset 0 -4px 10px rgba(0,0,0,0.5),inset 0 3px 6px rgba(255,255,255,0.2),0 4px 14px ${glow}`;
    if(shape==='hearts'){
      return(<div style={{position:'relative',width:'100%',aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',...anim}}>
        {isWinner&&<div style={{position:'absolute',inset:'-3px',borderRadius:'50%',border:`2px solid ${col}`,animation:'winPulse 0.9s ease-in-out infinite',color:col}}/>}
        <HeartSVG col={col} glow={glow}/>
      </div>);
    }
    if(shape==='stars'){
      return(<div style={{position:'relative',width:'100%',aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',...anim}}>
        {isWinner&&<div style={{position:'absolute',inset:'-3px',borderRadius:'50%',border:`2px solid ${col}`,animation:'winPulse 0.9s ease-in-out infinite',color:col}}/>}
        <StarSVG col={col} glow={glow}/>
      </div>);
    }
    if(shape==='bricks'){
      return(<div style={{position:'relative',width:'100%',aspectRatio:'1',...anim}}>
        {isWinner&&<div style={{position:'absolute',inset:'-2px',borderRadius:'28%',border:`2px solid ${col}`,animation:'winPulse 0.9s ease-in-out infinite',color:col}}/>}
        <div style={{width:'100%',height:'100%',borderRadius:'22%',background:`linear-gradient(145deg,${col}ff 0%,${col}bb 60%,rgba(0,0,0,0.35) 100%)`,backgroundColor:col,boxShadow:isWinner?winShadow:normShadow,transition:'box-shadow 0.3s ease',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:'8%',left:'10%',width:'40%',height:'28%',borderRadius:'40%',background:'rgba(255,255,255,0.22)',filter:'blur(1px)',transform:'rotate(-15deg)'}}/>
          <div style={{position:'absolute',bottom:'8%',right:'10%',width:'30%',height:'20%',borderRadius:'40%',background:'rgba(0,0,0,0.2)'}}/>
        </div>
      </div>);
    }
    return(<div style={{position:'relative',width:'100%',aspectRatio:'1'}}>
      {isWinner&&<div style={{position:'absolute',inset:'-3px',borderRadius:'50%',border:`2px solid ${col}`,animation:'winPulse 0.9s ease-in-out infinite',color:col}}/>}
      <div style={{width:'100%',height:'100%',borderRadius:'50%',background:`radial-gradient(circle at 35% 32%,#ffffff 0%,${col} 40%,rgba(0,0,0,0.4) 100%)`,backgroundColor:col,boxShadow:isWinner?winShadow:normShadow,...anim,transition:'box-shadow 0.3s ease',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'12%',left:'18%',width:'35%',height:'22%',borderRadius:'50%',background:'rgba(255,255,255,0.25)',filter:'blur(1px)',transform:'rotate(-20deg)'}}/>
      </div>
    </div>);
  }

  /* ════════════════════════════════════════════
     TIMER BAR
  ═════════════════════════════════════════════*/
  function TimerBar({seconds,max}){
    const pct=(seconds/max)*100;
    const col=pct>55?'var(--col-success)':pct>28?'var(--col-timer)':'var(--col-danger)';
    return(<div style={{width:'100%',height:5,background:'rgba(255,255,255,0.07)',borderRadius:3,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${pct}%`,borderRadius:3,background:col,boxShadow:`0 0 8px ${col}`,transition:'width 1s linear,background 0.4s ease'}}/>
    </div>);
  }

  /* ════════════════════════════════════════════
     POST-GAME MODAL
  ═════════════════════════════════════════════*/
  function PostGameModal({stats,onRematch,onMenu,onOnlineWin}){
    const{winner,moves,elapsed,p1Name,p2Name,p1Times,p2Times,isDraw:draw,mode,difficulty,isOnline,myRole}=stats;
    const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):'—';
    const wName=winner===P1?p1Name:winner===BOT?'Bot':p2Name;
    const wColor=winner?(winner===P1?'#ff3d6b':winner===BOT?'#a78bfa':'#fbbf24'):T.muted;
    const iWon=isOnline&&winner&&winner===myRole;
    useEffect(()=>{
      if(isOnline){
        if(iWon&&onOnlineWin)onOnlineWin();
        return;
      }
      if(draw){recordGameResult(null,null,true,p1Name,p2Name);}
      else if(winner){const winN=winner===P1?p1Name:winner===BOT?'Bot':p2Name;recordGameResult(winN,winner===P1?p2Name:p1Name,false,p1Name,p2Name);}
    },[]);
    const diffInfo=DIFFICULTIES.find(d=>d.id===difficulty);
    function getCommentary(){
      if(draw)return"A perfectly balanced match! Neither side gave an inch. True rivals.";
      const a1=avg(p1Times),a2=avg(p2Times);
      if(moves<14)return`Lightning fast! ${wName} secured the win in just ${moves} moves. Decisive and ruthless.`;
      if(moves>30)return`A grueling war of attrition across ${moves} moves. ${wName} outlasted the pressure.`;
      if(a1!=='—'&&a2!=='—'&&Math.abs(a1-a2)>5){const fast=a1<a2?p1Name:p2Name;return`${fast} played with blazing speed. ${wName} took the win.`;}
      return`A well-contested match! ${wName} read the board brilliantly in ${moves} moves.`;
    }
    const statItems=[{label:'Total Moves',val:moves,icon:'🎯'},{label:'Time Elapsed',val:`${elapsed}s`,icon:'⏱'},{label:`${p1Name} avg`,val:`${avg(p1Times)}s`,icon:'🔴'},{label:`${mode===MODE_LOCAL?p2Name:isOnline?p2Name:'Bot'} avg`,val:`${avg(p2Times)}s`,icon:mode===MODE_LOCAL||isOnline?'🟡':'🤖'}];
    return(
      <ModalOverlay>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:72,height:72,borderRadius:'50%',marginBottom:16,background:draw?T.surface:`${wColor}18`,border:`2px solid ${draw?T.border:wColor}`,fontSize:32,boxShadow:draw?'none':`0 0 24px ${wColor}44`}}>{draw?'🤝':'🏆'}</div>
          <h2 style={{fontFamily:'var(--font-display)',fontSize:28,fontWeight:800,letterSpacing:'-0.03em',color:draw?T.muted:wColor,textShadow:draw?'none':`0 0 20px ${wColor}88`,marginBottom:8}}>{draw?"It's a Draw!":`${wName} Wins!`}</h2>
          <p style={{color:T.muted,fontSize:13,lineHeight:1.6,fontStyle:'italic',maxWidth:320,margin:'0 auto'}}>{getCommentary()}</p>
          {mode===MODE_BOT&&diffInfo&&<div style={{display:'inline-flex',alignItems:'center',gap:6,marginTop:10,padding:'4px 12px',borderRadius:99,background:`${diffInfo.color}18`,border:`1px solid ${diffInfo.color}44`,fontSize:12,color:diffInfo.color,fontWeight:700}}>{diffInfo.emoji} {diffInfo.label} Bot</div>}
          {isOnline&&<div style={{display:'inline-flex',alignItems:'center',gap:6,marginTop:10,padding:'4px 12px',borderRadius:99,background:'rgba(56,189,248,0.12)',border:'1px solid rgba(56,189,248,0.35)',fontSize:12,color:T.accent,fontWeight:700}}>🌐 Online Match</div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
          {statItems.map(({label,val,icon},i)=>(
            <div key={label} style={{padding:'14px 16px',borderRadius:'var(--radius-md)',background:T.surface,border:`1px solid ${T.border}`,animation:`statReveal 0.35s ease ${i*0.08}s both`}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}><span style={{fontSize:14}}>{icon}</span><span style={{color:T.muted,fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',fontWeight:600}}>{label}</span></div>
              <div style={{fontFamily:'var(--font-mono)',fontWeight:600,fontSize:22,color:T.text}}>{val}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onRematch} style={{flex:1,padding:'13px',borderRadius:'var(--radius-md)',border:'none',background:'linear-gradient(135deg,var(--col-accent) 0%,#0ea5e9 100%)',color:'#02080f',fontWeight:700,fontSize:15,boxShadow:'0 4px 20px rgba(56,189,248,0.4)',transition:'all 0.15s'}} onMouseEnter={e=>e.currentTarget.style.transform='scale(1.02)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>Rematch</button>
          <button onClick={onMenu} style={{flex:1,padding:'13px',borderRadius:'var(--radius-md)',border:'1px solid var(--col-border-hi)',background:'var(--col-surface-high)',color:T.text,fontWeight:600,fontSize:15,transition:'all 0.15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'} onMouseLeave={e=>e.currentTarget.style.background='var(--col-surface-high)'}>Main Menu</button>
        </div>
      </ModalOverlay>
    );
  }

  function GlobalLeaderboard(){
    const[rows,setRows]=useState([]);
    const[loading,setLoading]=useState(true);
    const[err,setErr]=useState(null);
    useEffect(()=>{
      let cancelled=false;
      (async()=>{
        if(!FB.isConfigured()){setErr('Add Firebase config to enable global rankings.');setLoading(false);return;}
        const r=await FB.init();
        if(cancelled)return;
        if(!r.ok){setErr(r.error||'Could not connect');setLoading(false);return;}
        const top=await FB.fetchGlobalLeaderboard(10);
        if(!cancelled){setRows(top);setLoading(false);}
      })();
      return()=>{cancelled=true;};
    },[]);
    const medals=['🥇','🥈','🥉'];

      <div style={{width:'100%',maxWidth:420,marginTop:8,background:'rgba(12,17,32,0.7)',border:'1px solid var(--col-border)',borderRadius:'var(--radius-xl)',padding:'20px 22px',backdropFilter:'blur(16px)',boxShadow:'0 16px 48px rgba(0,0,0,0.45)'}}>

          <div style={{textAlign:'center',padding:'16px 0',color:T.danger,fontSize:12,lineHeight:1.5}}>{err}</div>
        ):rows.length===0?(
          <div style={{textAlign:'center',padding:'20px 0',color:T.dim,fontSize:12}}>No online wins yet. Be the first!</div>

  function SetupScreen({onStart,savedGame,shopState,onOpenShop,onOnlineStart}){
    const[mode,setMode]=useState(MODE_BOT);
    const[p1Name,setP1Name]=useState('Player 1');
    const[p2Name,setP2Name]=useState('Player 2');
    const[timerSec,setTimerSec]=useState(DEFAULT_TIMER);
    const[difficulty,setDiff]=useState('hard');
    const[joinCode,setJoinCode]=useState('');
    const[onlineBusy,setOnlineBusy]=useState(false);
    const[onlineErr,setOnlineErr]=useState(null);
    const globalName=FB.getSavedUsername()||p1Name;
    const orbs=[T.p1,T.p2,T.bot,T.accent];
    const selDiff=DIFFICULTIES.find(d=>d.id===difficulty);
    async function runOnline(action){
      setOnlineErr(null);setOnlineBusy(true);
      try{
        const name=(p1Name||'Player 1').trim();
        if(name)FB.saveUsername(name);
        let result;
        if(action==='create')result=await FB.createPrivateRoom(name);
        else if(action==='join')result=await FB.joinPrivateRoom(joinCode,name);
        else result=await FB.joinRandomQueue(name);
        if(!result.ok){setOnlineErr(result.error||'Failed');return;}
        onOnlineStart({
          ...result,
          playerName:name,
          timerSec,
          hostName:result.hostName||name,
          guestName:result.guestName,
          waiting:action==='create'||!!result.waiting,
        });
      }finally{setOnlineBusy(false);}
    }
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 16px'}}>

              <button onClick={()=>onStart(null,true)} style={{width:'100%',padding:'10px',borderRadius:'var(--radius-sm)',border:'1px solid rgba(56,189,248,0.4)',background:'rgba(56,189,248,0.1)',color:T.accent,fontWeight:700,fontSize:14,transition:'all 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(56,189,248,0.18)'}
                onMouseLeave={e=>e.currentTarget.style.background='rgba(56,189,248,0.1)'}
              >Continue Game →</button>
            </div>
          )}
          <div>
            <label>Game Mode</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
              {[{id:MODE_BOT,emoji:'🤖',label:'vs Bot',desc:'You vs AI'},{id:MODE_LOCAL,emoji:'👥',label:'Local 2P',desc:'Same device'},{id:MODE_ONLINE,emoji:'🌐',label:'Online',desc:'Global MP'}].map(m=>(
                <button key={m.id} onClick={()=>setMode(m.id)} style={{padding:'12px 8px',borderRadius:'var(--radius-md)',border:`1px solid ${mode===m.id?T.accent:T.border}`,background:mode===m.id?'rgba(56,189,248,0.1)':T.surface,color:mode===m.id?T.accent:T.muted,transition:'all 0.18s',boxShadow:mode===m.id?'0 0 16px rgba(56,189,248,0.12)':'none',textAlign:'center'}}
                  onMouseEnter={e=>{if(mode!==m.id)e.currentTarget.style.borderColor=T.borderHi;}}
                  onMouseLeave={e=>{if(mode!==m.id)e.currentTarget.style.borderColor=T.border;}}
                ><div style={{fontSize:20,marginBottom:4}}>{m.emoji}</div><div style={{fontWeight:700,fontSize:13}}>{m.label}</div><div style={{fontSize:10,opacity:.7}}>{m.desc}</div></button>
              ))}
            </div>
          </div>
          {mode===MODE_ONLINE&&(
            <div style={{animation:'difficultyAppear 0.25s ease forwards',display:'flex',flexDirection:'column',gap:12}}>
              <label>Online Multiplayer</label>
              {!FB.isConfigured()&&(
                <p style={{color:T.danger,fontSize:12,lineHeight:1.5,padding:'10px 12px',borderRadius:'var(--radius-sm)',background:'rgba(248,113,113,0.08)',border:'1px solid rgba(248,113,113,0.25)'}}>Configure <code style={{fontFamily:'var(--font-mono)',fontSize:11}}>firebase-config.js</code> to enable online play.</p>
              )}
              <div>
                <label>🔴 Your name (Red · Host)</label>
                <input type="text" value={p1Name} onChange={e=>setP1Name(e.target.value||'Player 1')} placeholder={globalName||'Player 1'}/>
              </div>
              <button disabled={onlineBusy||!FB.isConfigured()} onClick={()=>runOnline('create')} style={{width:'100%',padding:'13px',borderRadius:'var(--radius-md)',border:'1px solid rgba(255,61,107,0.35)',background:'rgba(255,61,107,0.1)',color:T.p1,fontWeight:700,fontSize:14,opacity:onlineBusy?0.6:1}}>
                🔐 Create Private Room
              </button>
              <div>
                <label>Join with 4-digit code</label>
                <div style={{display:'flex',gap:8}}>
                  <input type="text" inputMode="numeric" maxLength={4} value={joinCode} onChange={e=>setJoinCode(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="1234" style={{fontFamily:'var(--font-mono)',letterSpacing:'0.15em',textAlign:'center'}}/>
                  <button disabled={onlineBusy||joinCode.length!==4||!FB.isConfigured()} onClick={()=>runOnline('join')} style={{padding:'11px 16px',borderRadius:'var(--radius-sm)',border:'none',background:'linear-gradient(135deg,var(--col-accent),#0ea5e9)',color:'#020c16',fontWeight:800,fontSize:14,whiteSpace:'nowrap',opacity:onlineBusy?0.6:1}}>Join</button>
                </div>
              </div>
              <button disabled={onlineBusy||!FB.isConfigured()} onClick={()=>runOnline('random')} style={{width:'100%',padding:'13px',borderRadius:'var(--radius-md)',border:'1px solid rgba(251,191,36,0.35)',background:'rgba(251,191,36,0.08)',color:T.p2,fontWeight:700,fontSize:14,opacity:onlineBusy?0.6:1}}>
                🎲 Play with Random
              </button>
              {onlineErr&&<p style={{color:T.danger,fontSize:12,lineHeight:1.5}}>{onlineErr}</p>}
              <p style={{color:T.dim,fontSize:11,lineHeight:1.5}}>Host plays <span style={{color:T.p1,fontWeight:600}}>Red</span>, guest plays <span style={{color:T.p2,fontWeight:600}}>Yellow</span>. Moves sync in real time.</p>
            </div>
          )}
          {mode===MODE_BOT&&(
            <div style={{animation:'difficultyAppear 0.25s ease forwards'}}>
              <label>Bot Difficulty</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {DIFFICULTIES.map(d=>{
                  const active=difficulty===d.id;
                  return(<button key={d.id} onClick={()=>setDiff(d.id)} style={{padding:'11px 10px',borderRadius:'var(--radius-md)',border:`1px solid ${active?d.color:T.border}`,background:active?`${d.color}14`:T.surface,color:active?d.color:T.muted,transition:'all 0.15s',textAlign:'center',boxShadow:active?`0 0 14px ${d.color}22`:'none'}}
                    onMouseEnter={e=>{if(!active){e.currentTarget.style.borderColor=d.color+'55';e.currentTarget.style.color=d.color+'aa';}}}
                    onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}}
                  ><div style={{fontSize:18,marginBottom:3}}>{d.emoji}</div><div style={{fontWeight:700,fontSize:13}}>{d.label}</div><div style={{fontSize:10,opacity:.65,marginTop:2}}>{d.desc}</div></button>);
                })}
              </div>
              {selDiff&&(
                <div style={{marginTop:8,padding:'6px 12px',borderRadius:99,background:`${selDiff.color}12`,border:`1px solid ${selDiff.color}33`,display:'flex',alignItems:'center',gap:8,fontSize:12,color:selDiff.color}}>
                  <span>{selDiff.emoji}</span><span style={{fontWeight:600}}>{selDiff.label}:</span><span style={{opacity:.8}}>{selDiff.desc}</span>
                  {selDiff.id==='master'&&<span style={{marginLeft:'auto',fontSize:10,opacity:.6}}>Minimax d=6</span>}
                </div>
              )}
            </div>
          )}
          {mode!==MODE_ONLINE&&(
          <div style={{display:'grid',gridTemplateColumns:mode===MODE_LOCAL?'1fr 1fr':'1fr',gap:12}}>
            <div>
              <label>🔴 {mode===MODE_LOCAL?'Player 1':'Your Name'}</label>
              <input type="text" value={p1Name} onChange={e=>setP1Name(e.target.value||'Player 1')}/>
            </div>
            {mode===MODE_LOCAL&&<div><label>🟡 Player 2</label><input type="text" value={p2Name} onChange={e=>setP2Name(e.target.value||'Player 2')}/></div>}
          </div>
          )}
          {mode!==MODE_ONLINE&&(
          <div>
            <label style={{display:'flex',justifyContent:'space-between'}}><span>Turn Timer</span><span style={{fontFamily:'var(--font-mono)',color:T.accent,letterSpacing:'normal',textTransform:'none'}}>{timerSec}s</span></label>
            <input type="range" min={5} max={60} step={5} value={timerSec} onChange={e=>setTimerSec(Number(e.target.value))}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4,color:T.dim,fontSize:11}}><span>5s (fast)</span><span>30s</span><span>60s (chill)</span></div>
          </div>
          )}
          {mode!==MODE_ONLINE&&(
          <button onClick={()=>onStart({mode,p1Name:p1Name||'Player 1',p2Name:p2Name||'Player 2',timerSec,difficulty})}
            style={{width:'100%',padding:'15px',borderRadius:'var(--radius-md)',border:'none',background:'linear-gradient(135deg,var(--col-accent) 0%,#0ea5e9 100%)',color:'#020c16',fontWeight:800,fontSize:16,letterSpacing:'0.02em',boxShadow:'0 6px 28px rgba(56,189,248,0.45)',transition:'all 0.18s'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 10px 36px rgba(56,189,248,0.6)';}}
            onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 6px 28px rgba(56,189,248,0.45)';}}
          >Launch Game →</button>
          )}
        </div>
        <GlobalLeaderboard/>
      </div>
    );
  }

  /* ════════════════════════════════════════════
     GAME SCREEN
  ═════════════════════════════════════════════*/
  function GameScreen({config,onMenu,shopState,onOpenShop,onOnlineWin}){
    const{mode,p1Name,p2Name,timerSec,difficulty='hard',roomPath,myRole,isHost,playerName}=config;
    const isOnline=mode===MODE_ONLINE;
    const hostName=isOnline?(config.hostName||playerName||'Host'):p1Name;
    const guestName=isOnline?(config.guestName||'Waiting…'):mode===MODE_LOCAL?p2Name:'Bot';
    const p2Label=isOnline?guestName:mode===MODE_LOCAL?p2Name:'Bot';
    const p2Token=isOnline?P2:mode===MODE_LOCAL?P2:BOT;
    const[onlineRole,setOnlineRole]=useState(myRole);
    const activeRole=isOnline?(onlineRole||myRole):null;
    const myPlayer=isOnline?activeRole:null;
    const displayP1Name=hostName;

    const[board,setBoard]=useState(makeBoard());
    const[current,setCurrent]=useState(P1);
    const[winInfo,setWinInfo]=useState(null);
    const[drawGame,setDrawGame]=useState(false);
    const[newCell,setNewCell]=useState(null);
    const[hoverCol,setHoverCol]=useState(null);
    const[advisorCol,setAdvisorCol]=useState(null);
    const[advisorUsed,setAdvisorUsed]=useState(false);
    const[timerLeft,setTimerLeft]=useState(timerSec);
    const[showLB,setShowLB]=useState(false);
    const[showPostGame,setShowPostGame]=useState(false);
    const[moveCount,setMoveCount]=useState(0);
    const[gameStart]=useState(Date.now());
    const[p1Times,setP1Times]=useState([]);
    const[p2Times,setP2Times]=useState([]);
    const[turnStart,setTurnStart]=useState(Date.now());
    const[gameOver,setGameOver]=useState(false);
    // lbRefresh key forces InlineLeaderboard to re-read after game ends
    const[lbKey,setLbKey]=useState(0);
    const[disconnectMsg,setDisconnectMsg]=useState(null);
    const[moveErr,setMoveErr]=useState(null);
    const[syncing,setSyncing]=useState(isOnline);
    const lastMoveRef=useRef(null);
    const timerRef=useRef(null),botTimeout=useRef(null);
    const isDesktop=useDesktop();
    const isBotTurn=!isOnline&&mode===MODE_BOT&&current===BOT;
    const isMyTurn=isOnline?!gameOver&&current===myPlayer:!gameOver&&!isBotTurn;
    const diffInfo=DIFFICULTIES.find(d=>d.id===difficulty);
    const activeTheme=BOARD_THEMES.find(t=>t.id===(shopState&&shopState.boardTheme))||BOARD_THEMES[0];
    const curColorRaw=playerColorRaw(current,shopState);
    const p1ColorVal=playerColorRaw(P1,shopState);
    const p2ColorVal=playerColorRaw(p2Token,shopState);

    useEffect(()=>{
      if(isOnline)return;
      if(gameOver){localStorage.removeItem(STORAGE_KEY);setLbKey(k=>k+1);return;}
      const s={board,current,p1Name,p2Name,timerSec,timerLeft,moveCount,p1Times,p2Times,mode,difficulty,turnStart:Date.now()};
      localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
    },[board,current,timerLeft,isOnline]);

    useEffect(()=>{
      if(!isOnline||!roomPath)return;
      if(myRole)FB.setPresence(roomPath,myRole,true);
      const unsub=FB.subscribeRoom(roomPath,(room)=>{
        if(!room)return;
        setSyncing(false);
        const uid=FB.getUid();
        const liveRole=FB.roleFromRoom(room,uid);
        if(liveRole){
          setOnlineRole(liveRole);
          FB.setPresence(roomPath,liveRole,true);
        }
        if(room.board)setBoard(room.board);
        if(room.current)setCurrent(room.current);
        setMoveCount(room.moveCount||0);
        if(room.status!=='playing'&&!gameOver&&room.status!=='finished'){
          setMoveErr(room.status==='waiting'?'Waiting for opponent to join…':'Game not active');
        }else if(room.status==='playing')setMoveErr(null);
        if(room.winInfo){setWinInfo(room.winInfo);setGameOver(true);}
        else if(room.isDraw){setDrawGame(true);setGameOver(true);}
        else{setWinInfo(null);setDrawGame(false);if(room.status==='playing')setGameOver(false);}
        if(room.lastMove){
          const lm=room.lastMove;
          const key=lm.col+'-'+lm.row+'-'+lm.at;
          if(lastMoveRef.current!==key){lastMoveRef.current=key;setNewCell([lm.row,lm.col]);setTimeout(()=>setNewCell(null),450);}
        }
        if(room.disconnected){
          const who=room.disconnected==='host'?room.hostName:room.guestName;
          setDisconnectMsg(who?`${who} disconnected`:'Opponent disconnected');
        }else setDisconnectMsg(null);
        if(room.status==='playing'&&room.guestId&&!showPostGame)setShowPostGame(false);
        if(room.status==='finished'&&!showPostGame)setTimeout(()=>setShowPostGame(true),600);
        if(room.status==='playing'&&room.moveCount===0&&!room.winInfo&&!room.isDraw){setShowPostGame(false);setWinInfo(null);setDrawGame(false);setGameOver(false);}
      });
      return()=>{unsub();};
    },[roomPath,isOnline,myRole]);

    useEffect(()=>{
      if(isOnline||gameOver)return;
      clearInterval(timerRef.current);
      setTimerLeft(timerSec);setTurnStart(Date.now());
      timerRef.current=setInterval(()=>{
        setTimerLeft(prev=>{if(prev<=1){clearInterval(timerRef.current);handleTimeout();return timerSec;}return prev-1;});
      },1000);
      return()=>clearInterval(timerRef.current);
    },[current,gameOver]);

    useEffect(()=>{
      if(!isBotTurn||gameOver)return;
      const delay=difficulty==='master'?200:800;
      botTimeout.current=setTimeout(()=>{doMoveLocal(getBotMove(board,BOT,difficulty),BOT);},delay);
      return()=>clearTimeout(botTimeout.current);
    },[current,gameOver]);

    function handleTimeout(){
      const el=Math.round((Date.now()-turnStart)/1000);
      if(current===P1)setP1Times(p=>[...p,el]);else setP2Times(p=>[...p,el]);
      setAdvisorCol(null);setAdvisorUsed(false);setCurrent(current===P1?p2Token:P1);
    }
    function doMoveLocal(col,player){
      if(!isValidCol(board,col))return;
      clearInterval(timerRef.current);clearTimeout(botTimeout.current);
      const row=getDropRow(board,col),next=dropPiece(board,col,player);if(!next)return;
      setBoard(next);setNewCell([row,col]);setMoveCount(m=>m+1);
      const el=Math.round((Date.now()-turnStart)/1000);
      if(player===P1)setP1Times(p=>[...p,el]);else setP2Times(p=>[...p,el]);
      setAdvisorCol(null);setAdvisorUsed(false);
      setTimeout(()=>setNewCell(null),450);
      const win=checkWinner(next);
      if(win){setWinInfo(win);setGameOver(true);setTimeout(()=>setShowPostGame(true),950);return;}
      if(isDraw(next)){setDrawGame(true);setGameOver(true);setTimeout(()=>setShowPostGame(true),500);return;}
      setCurrent(player===P1?p2Token:P1);
    }
    async function handleColClick(col){
      if(gameOver||!isValidCol(board,col))return;
      if(isOnline){
        const turnRole=onlineRole||myRole;
        if(!turnRole){setMoveErr('Connecting…');return;}
        if(current!==turnRole){setMoveErr('Not your turn');return;}
        if(syncing)return;
        setMoveErr(null);
        setSyncing(true);
        try{
          const res=await FB.dropPiece(roomPath,col,turnRole,{isValidCol,dropPiece,checkWinner,isDraw,getDropRow});
          if(!res.ok){
            if(res.reason==='not_applied')setMoveErr(current!==turnRole?'Not your turn':'Column full or game not ready');
            else setMoveErr('Move failed — try again');
          }
        }catch(e){
          setMoveErr(e.message||'Network error');
        }finally{
          setSyncing(false);
        }
        return;
      }
      if(isBotTurn)return;
      doMoveLocal(col,current);
    }
    function handleAdvisor(){if(gameOver||isBotTurn||isOnline||advisorUsed)return;setAdvisorCol(getAdvisorCol(board,current));setAdvisorUsed(true);}
    async function handleRematch(){
      if(isOnline){
        setShowPostGame(false);
        await FB.requestRematch(roomPath,FB.getUid());
        return;
      }
      setBoard(makeBoard());setCurrent(P1);setWinInfo(null);setDrawGame(false);
      setNewCell(null);setAdvisorCol(null);setAdvisorUsed(false);setMoveCount(0);
      setP1Times([]);setP2Times([]);setShowPostGame(false);setGameOver(false);setTimerLeft(timerSec);
    }

    /* ─── Left side panel contents ──────── */
    const LeftPanelContent=()=>(
      <>
        {/* Player cards */}
        <GlassPanel style={{padding:'16px'}}>
          <div style={{fontSize:10,color:T.dim,letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:700,marginBottom:12}}>Players</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {/* P1 */}
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:'var(--radius-sm)',background:current===P1&&!gameOver?`rgba(${p1ColorVal.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')},0.08)`:T.surface,border:`1px solid ${current===P1&&!gameOver?p1ColorVal:T.border}`,transition:'all 0.3s',boxShadow:current===P1&&!gameOver?`0 0 16px ${playerGlowHex(p1ColorVal)}`:'none'}}>
              <div style={{width:14,height:14,borderRadius:'50%',flexShrink:0,background:p1ColorVal,boxShadow:current===P1&&!gameOver?`0 0 8px ${p1ColorVal}`:'none'}}/>
              <div style={{flex:1,overflow:'hidden'}}>
                <div style={{fontWeight:700,fontSize:14,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayP1Name}{isOnline&&isHost&&<span style={{marginLeft:6,fontSize:9,color:T.dim}}>HOST</span>}</div>
                {current===P1&&!gameOver&&<div style={{fontSize:10,color:p1ColorVal,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginTop:1}}>{myPlayer===P1?'Your turn':'Their turn'}</div>}
              </div>
              {current===P1&&!gameOver&&<div style={{width:8,height:8,borderRadius:'50%',background:p1ColorVal,animation:'pulse 0.8s ease-in-out infinite',boxShadow:`0 0 6px ${p1ColorVal}`}}/>}
            </div>
            <div style={{textAlign:'center',color:T.dim,fontSize:11,fontWeight:700,letterSpacing:'0.12em'}}>VS</div>
            {/* P2 */}
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:'var(--radius-sm)',background:current!==P1&&!gameOver?'rgba(255,255,255,0.06)':T.surface,border:`1px solid ${current!==P1&&!gameOver?p2ColorVal:T.border}`,transition:'all 0.3s',boxShadow:current!==P1&&!gameOver?`0 0 16px ${playerGlowHex(p2ColorVal)}`:'none'}}>
              <div style={{width:14,height:14,borderRadius:'50%',flexShrink:0,background:p2ColorVal,boxShadow:current!==P1&&!gameOver?`0 0 8px ${p2ColorVal}`:'none'}}/>
              <div style={{flex:1,overflow:'hidden'}}>
                <div style={{fontWeight:700,fontSize:14,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p2Label}</div>
                {current!==P1&&!gameOver&&<div style={{fontSize:10,color:p2ColorVal,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginTop:1}}>{isBotTurn?'Thinking…':myPlayer===P2?'Your turn':'Their turn'}</div>}
              </div>
              {current!==P1&&!gameOver&&<div style={{width:8,height:8,borderRadius:'50%',background:p2ColorVal,animation:'pulse 0.8s ease-in-out infinite',boxShadow:`0 0 6px ${p2ColorVal}`}}/>}
            </div>
          </div>
        </GlassPanel>

        {/* Timer */}
        {!gameOver&&!isOnline&&(
          <GlassPanel style={{padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {isBotTurn&&<div style={{width:7,height:7,borderRadius:'50%',background:T.bot,animation:'pulse 0.8s ease-in-out infinite',boxShadow:`0 0 6px ${T.bot}`}}/>}
                <span style={{fontSize:11,fontWeight:700,color:isBotTurn?T.bot:curColorRaw,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                  {isBotTurn?`${diffInfo?.label||''} thinking…`:`${current===P1?displayP1Name:p2Label}'s turn`}
                </span>
              </div>
              <span style={{fontFamily:'var(--font-mono)',fontWeight:700,fontSize:18,color:timerLeft<=5?T.danger:timerLeft<=10?T.timer:T.text,animation:timerLeft<=5?'timerFlash 0.5s ease-in-out infinite':'none'}}>{timerLeft}s</span>
            </div>
            <TimerBar seconds={timerLeft} max={timerSec}/>
          </GlassPanel>
        )}
        {!gameOver&&isOnline&&(
          <GlassPanel style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:isMyTurn?curColorRaw:T.muted,letterSpacing:'0.06em',textTransform:'uppercase'}}>
              {isMyTurn?'Your turn — drop a piece':`Waiting for opponent… (${current===P1?displayP1Name:p2Label})`}
            </div>
            {moveErr&&<div style={{marginTop:8,fontSize:11,color:T.danger}}>{moveErr}</div>}
          </GlassPanel>
        )}

        {/* Game result on desktop */}
        {gameOver&&(
          <GlassPanel style={{padding:'14px 16px',textAlign:'center',border:`1px solid ${drawGame?T.border:winInfo?playerColorRaw(winInfo.winner,shopState):T.border}44`}}>
            <div style={{fontWeight:800,fontSize:16,color:drawGame?T.muted:winInfo?playerColorRaw(winInfo.winner,shopState):T.muted}}>
              {drawGame?"🤝 It's a Draw!":`🎉 ${winInfo?.winner===P1?displayP1Name:p2Label} wins!`}
            </div>
          </GlassPanel>
        )}

        {/* Advisor */}
        {!gameOver&&!isBotTurn&&!isOnline&&(
          <AdvisorButton onAdvisor={handleAdvisor} used={advisorUsed} disabled={gameOver||isBotTurn}/>
        )}

        {/* Rematch / Menu on desktop after game */}
        {gameOver&&(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <button onClick={handleRematch} style={{width:'100%',padding:'12px',borderRadius:'var(--radius-md)',border:'none',background:`linear-gradient(135deg,${T.accent} 0%,#0ea5e9 100%)`,color:'#020c16',fontWeight:800,fontSize:14,boxShadow:`0 4px 18px rgba(56,189,248,0.4)`,transition:'all 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.transform='scale(1.03)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
            >Rematch</button>
            <button onClick={onMenu} style={{width:'100%',padding:'12px',borderRadius:'var(--radius-md)',border:`1px solid ${T.borderHi}`,background:T.surface,color:T.text,fontWeight:600,fontSize:14,transition:'all 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.background=T.surfaceH} onMouseLeave={e=>e.currentTarget.style.background=T.surface}
            >← Menu</button>
          </div>
        )}

        {/* Move counter */}
        <div style={{textAlign:'center',color:T.dim,fontSize:10,fontFamily:'var(--font-mono)',letterSpacing:'0.06em'}}>
          MOVE #{moveCount} · {Math.round((Date.now()-gameStart)/1000)}s
        </div>
      </>
    );

    /* ─── Board JSX ─────────────────────────── */
    const BoardJSX=(
      <div onMouseLeave={()=>setHoverCol(null)} style={{width:'100%',background:activeTheme.bg,borderRadius:'var(--radius-xl)',padding:'14px 14px 10px',border:`2px solid ${activeTheme.rim}`,boxShadow:`0 24px 64px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.06)`,position:'relative'}}>
        {/* Drop indicators */}
        <div style={{display:'grid',gridTemplateColumns:`repeat(${COLS},1fr)`,gap:6,marginBottom:6,height:16}}>
          {Array(COLS).fill(0).map((_,c)=>{
            const canHover=(isOnline?isMyTurn:!isBotTurn)&&!gameOver&&isValidCol(board,c);
            const isAdvisor=advisorCol===c,isHov=hoverCol===c&&canHover;
            return(
              <div key={c} style={{display:'flex',justifyContent:'center',alignItems:'center',position:'relative'}}>
                {(isAdvisor||isHov)&&(
                  <>
                    <div style={{width:10,height:10,borderRadius:'50%',background:isAdvisor?T.accent:curColorRaw,boxShadow:isAdvisor?`0 0 10px ${T.accent}`:`0 0 8px ${curColorRaw}`,animation:'colHoverBounce 0.7s ease-in-out infinite'}}/>
                    {isAdvisor&&<div style={{position:'absolute',width:20,height:20,borderRadius:'50%',border:`2px solid ${T.accent}`,animation:'advisorPing 1.1s ease-out infinite'}}/>}
                  </>
                )}
              </div>
            );
          })}
        </div>
        {/* Grid */}
        {board.map((row,r)=>(
          <div key={r} style={{display:'grid',gridTemplateColumns:`repeat(${COLS},1fr)`,gap:6,marginBottom:r<ROWS-1?6:0}}>
            {row.map((cell,c)=>{
              const isWinCell=winInfo?.cells.some(([wr,wc])=>wr===r&&wc===c);
              const isNew=newCell?.[0]===r&&newCell?.[1]===c;
              const canPlayCol=(isOnline?isMyTurn:!isBotTurn)&&!gameOver&&isValidCol(board,c);
              const isHovCol=hoverCol===c&&canPlayCol;
              const isAdvCol=advisorCol===c&&!cell;
              return(
                <div key={c} onClick={()=>handleColClick(c)} onMouseEnter={()=>setHoverCol(c)}
                  style={{borderRadius:'var(--radius-sm)',padding:3,cursor:canPlayCol?'pointer':'default',background:isAdvCol?'rgba(56,189,248,0.08)':isHovCol?'rgba(255,255,255,0.04)':'transparent',outline:isAdvCol?'1.5px solid rgba(56,189,248,0.3)':'none',outlineOffset:-2,transition:'background 0.15s',opacity:isOnline&&syncing?0.7:1}}>
                  <Piece player={cell} isNew={isNew} isWinner={isWinCell} shopState={shopState}/>
                </div>
              );
            })}
          </div>
        ))}
        <div style={{marginTop:10,textAlign:'center',color:'rgba(255,255,255,0.08)',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',fontWeight:700,fontFamily:'var(--font-display)'}}>Connect Four</div>
      </div>
    );

    /* ─── DESKTOP LAYOUT ────────────────────── */
    if(isDesktop){
      return(
        <div className="game-layout">
          {/* Top bar — desktop */}
          <div className="game-topbar">
            <button onClick={onMenu} style={{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'1px solid var(--col-border)',background:T.surface,color:T.muted,fontSize:13,fontWeight:600,transition:'all 0.15s',flexShrink:0}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=T.borderHi;e.currentTarget.style.color=T.text;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}
            >← Menu</button>
            <div>
              <span style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:22,letterSpacing:'-0.03em',color:T.text}}>Connect Four</span>
              {mode===MODE_BOT&&diffInfo&&<span style={{marginLeft:12,fontSize:12,color:diffInfo.color,fontWeight:700}}>{diffInfo.emoji} {diffInfo.label} Bot</span>}
              {isOnline&&<span style={{marginLeft:12,fontSize:12,color:T.accent,fontWeight:700}}>🌐 Online</span>}
            </div>
          </div>
          {disconnectMsg&&(
            <div style={{gridColumn:'1 / -1',width:'100%',padding:'12px 16px',borderRadius:'var(--radius-md)',background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.35)',color:T.danger,fontSize:13,fontWeight:600,textAlign:'center',marginBottom:12}}>
              ⚠️ {disconnectMsg}. You can return to the menu.
            </div>
          )}

          {/* Left column */}
          <div className="side-panel side-panel-left">
            <LeftPanelContent/>
          </div>

          {/* Center column — board only */}
          <div className="game-inner">
            {BoardJSX}
          </div>

          {/* Right column — leaderboard + shop */}
          <div className="side-panel side-panel-right">
            <InlineLeaderboard refreshKey={lbKey}/>
            {/* Shop shortcut */}
            <GlassPanel style={{padding:'14px 16px'}}>
              <div style={{fontSize:10,color:T.dim,letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:700,marginBottom:10}}>Dashboard</div>
              <button onClick={onOpenShop} style={{width:'100%',padding:'11px',borderRadius:'var(--radius-md)',border:'1px solid rgba(245,158,11,0.3)',background:'rgba(245,158,11,0.06)',color:'#f59e0b',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(245,158,11,0.12)';e.currentTarget.style.boxShadow='0 0 16px rgba(245,158,11,0.2)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='rgba(245,158,11,0.06)';e.currentTarget.style.boxShadow='none';}}
              >
                <span>🛒</span>
                <span>Customization Shop</span>
                {shopState.proUnlocked&&<span style={{fontSize:10,background:'rgba(245,158,11,0.2)',padding:'1px 7px',borderRadius:99}}>👑</span>}
              </button>
              {/* Active customizations summary */}
              <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:6}}>
                {[
                  {label:PIECE_SHAPES.find(s=>s.id===shopState.pieceShape)?.label||'Classic',icon:'🎮'},
                  {label:BOARD_THEMES.find(t=>t.id===shopState.boardTheme)?.label||'Deep Cyber',icon:'🖼'},
                ].map(({label,icon})=>(
                  <div key={label} style={{fontSize:10,color:T.muted,background:T.surface,borderRadius:99,padding:'3px 8px',border:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:4}}>
                    <span>{icon}</span><span>{label}</span>
                  </div>
                ))}
              </div>
            </GlassPanel>
          </div>

          {/* Mobile LB modal still works if triggered (shouldn't be on desktop, but safety) */}
          {showLB&&<LeaderboardModal onClose={()=>setShowLB(false)}/>}
          {showPostGame&&(
            <PostGameModal
              stats={{winner:winInfo?.winner,isDraw:drawGame,moves:moveCount,elapsed:Math.round((Date.now()-gameStart)/1000),p1Name:displayP1Name,p2Name:p2Label,p1Times,p2Times,mode,difficulty,isOnline,myRole}}
              onRematch={()=>{setShowPostGame(false);handleRematch();}}
              onMenu={()=>{setShowPostGame(false);onMenu();}}
              onOnlineWin={onOnlineWin}
            />
          )}
        </div>
      );
    }

    /* ─── MOBILE LAYOUT (unchanged) ─────────── */
    return(
      <div className="game-layout" style={{flexDirection:'column',alignItems:'center',padding:'20px 12px 32px'}}>
        {/* Top nav */}
        <div style={{width:'100%',maxWidth:560,display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <button onClick={onMenu} style={{padding:'8px 14px',borderRadius:'var(--radius-sm)',border:'1px solid var(--col-border)',background:T.surface,color:T.muted,fontSize:13,fontWeight:600,transition:'all 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.borderHi;e.currentTarget.style.color=T.text;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}
          >← Menu</button>
          <div style={{textAlign:'center'}}>
            <h1 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:20,letterSpacing:'-0.03em',color:T.text}}>Connect Four</h1>
            {mode===MODE_BOT&&diffInfo&&<div style={{fontSize:11,color:diffInfo.color,fontWeight:600,marginTop:2}}>{diffInfo.emoji} {diffInfo.label} Bot</div>}
            {isOnline&&<div style={{fontSize:11,color:T.accent,fontWeight:600,marginTop:2}}>🌐 Online</div>}
          </div>
          <button className="desktop-nav-lb-btn" onClick={()=>setShowLB(true)} style={{padding:'8px 14px',borderRadius:'var(--radius-sm)',border:'1px solid rgba(251,191,36,0.3)',background:'rgba(251,191,36,0.06)',color:T.p2,fontSize:13,fontWeight:700,transition:'all 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(251,191,36,0.12)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(251,191,36,0.06)'}
          >🏆 Board</button>
        </div>

        {disconnectMsg&&(
          <div style={{width:'100%',maxWidth:560,marginBottom:12,padding:'12px 16px',borderRadius:'var(--radius-md)',background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.35)',color:T.danger,fontSize:13,fontWeight:600,textAlign:'center'}}>
            ⚠️ {disconnectMsg}
          </div>
        )}
        {/* Player cards + timer */}
        <div style={{width:'100%',maxWidth:560,marginBottom:16,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:10,alignItems:'stretch'}}>
            <PlayerCard name={displayP1Name} color={p1ColorVal} glow={playerGlowHex(p1ColorVal)} active={current===P1&&!gameOver}/>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 6px',color:T.dim,fontSize:12,fontWeight:700,letterSpacing:'0.1em'}}>VS</div>
            <PlayerCard name={p2Label} color={p2ColorVal} glow={playerGlowHex(p2ColorVal)} active={current!==P1&&!gameOver} right/>
          </div>
          {!gameOver?(
            isOnline?(
              <div style={{background:'rgba(12,17,32,0.6)',border:'1px solid var(--col-border)',borderRadius:'var(--radius-md)',padding:'10px 16px',textAlign:'center'}}>
                <div style={{fontSize:12,fontWeight:700,color:isMyTurn?curColorRaw:T.muted,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                  {isMyTurn?'Your turn — tap a column':'Opponent\'s turn'}
                </div>
                {moveErr&&<div style={{marginTop:6,fontSize:11,color:T.danger}}>{moveErr}</div>}
              </div>
            ):(
            <div style={{background:'rgba(12,17,32,0.6)',border:'1px solid var(--col-border)',borderRadius:'var(--radius-md)',padding:'10px 16px',backdropFilter:'blur(8px)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  {isBotTurn&&<div style={{width:8,height:8,borderRadius:'50%',background:T.bot,animation:'pulse 0.8s ease-in-out infinite',boxShadow:`0 0 6px ${T.bot}`}}/>}
                  <span style={{fontSize:12,fontWeight:700,color:isBotTurn?T.bot:curColorRaw,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                    {isBotTurn?`Bot thinking… (${diffInfo?.label||''})`:`${current===P1?displayP1Name:p2Label}'s turn`}
                  </span>
                </div>
                <span style={{fontFamily:'var(--font-mono)',fontWeight:600,fontSize:16,color:timerLeft<=5?T.danger:timerLeft<=10?T.timer:T.muted,animation:timerLeft<=5?'timerFlash 0.5s ease-in-out infinite':'none'}}>{timerLeft}s</span>
              </div>
              <TimerBar seconds={timerLeft} max={timerSec}/>
            </div>
            )
          ):(
            <div style={{textAlign:'center',padding:'12px',borderRadius:'var(--radius-md)',background:drawGame?T.surface:`${winInfo?playerColorRaw(winInfo.winner,shopState):T.muted}14`,border:`1px solid ${drawGame?T.border:winInfo?playerColorRaw(winInfo.winner,shopState):T.muted}44`,fontWeight:800,fontSize:16,color:drawGame?T.muted:winInfo?playerColorRaw(winInfo.winner,shopState):T.muted}}>
              {drawGame?"🤝 It's a Draw!":`🎉 ${winInfo?.winner===P1?displayP1Name:p2Label} wins!`}
            </div>
          )}
        </div>

        {/* Board */}
        <div style={{width:'100%',maxWidth:560}}>{BoardJSX}</div>

        {/* Actions */}
        <div style={{marginTop:16,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
          {!gameOver&&!isBotTurn&&!isOnline&&<AdvisorButton onAdvisor={handleAdvisor} used={advisorUsed} disabled={gameOver||isBotTurn}/>}
          {gameOver&&(
            <>
              <button onClick={handleRematch} style={{padding:'10px 24px',borderRadius:'var(--radius-md)',border:'none',background:`linear-gradient(135deg,${T.accent} 0%,#0ea5e9 100%)`,color:'#020c16',fontWeight:800,fontSize:14,boxShadow:`0 4px 18px rgba(56,189,248,0.4)`,transition:'all 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='scale(1.04)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
              >Rematch</button>
              <button onClick={onMenu} style={{padding:'10px 24px',borderRadius:'var(--radius-md)',border:`1px solid ${T.borderHi}`,background:T.surface,color:T.text,fontWeight:600,fontSize:14,transition:'all 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.background=T.surfaceH} onMouseLeave={e=>e.currentTarget.style.background=T.surface}
              >Menu</button>
            </>
          )}
        </div>
        <div style={{marginTop:12,color:T.dim,fontSize:11,fontFamily:'var(--font-mono)',letterSpacing:'0.05em'}}>
          MOVE #{moveCount} · {Math.round((Date.now()-gameStart)/1000)}s
        </div>

        {showLB&&<LeaderboardModal onClose={()=>setShowLB(false)}/>}
        {showPostGame&&(
          <PostGameModal
            stats={{winner:winInfo?.winner,isDraw:drawGame,moves:moveCount,elapsed:Math.round((Date.now()-gameStart)/1000),p1Name:displayP1Name,p2Name:p2Label,p1Times,p2Times,mode,difficulty,isOnline,myRole}}
            onRematch={()=>{setShowPostGame(false);handleRematch();}}
            onMenu={()=>{setShowPostGame(false);onMenu();}}
            onOnlineWin={onOnlineWin}
          />
        )}
      </div>
    );
  }

  /* ════════════════════════════════════════════
     ROOT
  ═════════════════════════════════════════════*/
  function App(){
    const[screen,setScreen]=useState('setup');
    const[gameConfig,setConfig]=useState(null);
    const[savedGame,setSaved]=useState(null);
    const[shopState,setShopState]=useState(loadShopState);
    const[showShop,setShowShop]=useState(false);
    const[onlineWait,setOnlineWait]=useState(null);
    const[showUsernamePrompt,setShowUsernamePrompt]=useState(false);

    useEffect(()=>{try{const r=localStorage.getItem(STORAGE_KEY);if(r)setSaved(JSON.parse(r));}catch{}},[]);

    function enterOnlineGame(meta){
      setOnlineWait(null);
      setConfig({
        mode:MODE_ONLINE,
        p1Name:meta.hostName||meta.playerName||'Host',
        p2Name:meta.guestName||'Guest',
        hostName:meta.hostName||meta.playerName||'Host',
        guestName:meta.guestName||'Guest',
        timerSec:meta.timerSec||DEFAULT_TIMER,
        roomPath:meta.roomPath,
        myRole:meta.role||meta.myRole,
        isHost:meta.isHost,
        playerName:meta.playerName,
        code:meta.code,
      });
      setScreen('game');
    }

    function handleOnlineStart(meta){
      if(meta.waiting){
        setOnlineWait(meta);
        setScreen('online-wait');
        return;
      }
      enterOnlineGame(meta);
    }

    useEffect(()=>{
      if(screen!=='online-wait'||!onlineWait?.roomPath)return;
      const unsub=FB.subscribeRoom(onlineWait.roomPath,(room)=>{
        if(room&&room.status==='playing'&&room.guestId){
          enterOnlineGame({
            ...onlineWait,
            role:onlineWait.role||FB.roleFromRoom(room,FB.getUid())||P1,
            hostName:room.hostName,
            guestName:room.guestName,
            waiting:false,
          });
        }
      });
      return unsub;
    },[screen,onlineWait?.roomPath]);

    async function handleCancelOnlineWait(){
      if(onlineWait?.roomPath)await FB.leaveRoom(onlineWait.roomPath,FB.getUid());
      await FB.cancelQueue();
      setOnlineWait(null);
      setScreen('setup');
    }

    function handleStart(cfg,resume=false){
      if(resume&&savedGame){setConfig({mode:savedGame.mode,p1Name:savedGame.p1Name,p2Name:savedGame.p2Name,timerSec:savedGame.timerSec,difficulty:savedGame.difficulty||'hard',resumeState:savedGame});}
      else{setConfig(cfg);setSaved(null);}
      setScreen('game');
    }
    function handleMenu(){
      if(gameConfig?.roomPath)FB.leaveRoom(gameConfig.roomPath,FB.getUid());
      FB.cancelQueue();
      setScreen('setup');setConfig(null);setOnlineWait(null);
      try{const r=localStorage.getItem(STORAGE_KEY);if(r)setSaved(JSON.parse(r));}catch{}
    }
    function handleShopSave(newState){setShopState(newState);saveShop(newState);}
    useEffect(()=>{if(screen==='setup')setShopState(loadShopState());},[screen]);
    function handleOnlineWinPrompt(){
      const saved=FB.getSavedUsername();
      if(saved){FB.recordGlobalWin(saved);return;}
      setShowUsernamePrompt(true);
    }
    async function saveGlobalWin(name){
      await FB.recordGlobalWin(name);
      setShowUsernamePrompt(false);
    }

    return(
      <>
        {screen==='setup'&&<SetupScreen onStart={handleStart} savedGame={savedGame} shopState={shopState} onOpenShop={()=>setShowShop(true)} onOnlineStart={handleOnlineStart}/>}
        {screen==='online-wait'&&(
          <OnlineWaitingScreen
            title={onlineWait?.code?'Private Room':'Finding opponent…'}
            subtitle={onlineWait?.code?'Waiting for a friend to join with your code.':'Searching the random queue for your next rival.'}
            code={onlineWait?.code}
            status="Listening for players…"
            onCancel={handleCancelOnlineWait}
          />
        )}
        {screen==='game'&&gameConfig&&<GameScreen config={gameConfig} onMenu={handleMenu} shopState={shopState} onOpenShop={()=>setShowShop(true)} onOnlineWin={handleOnlineWinPrompt}/>}
        {showShop&&<ShopModal onClose={()=>setShowShop(false)} shopState={shopState} onSave={handleShopSave}/>}
        {showUsernamePrompt&&<UsernamePromptModal defaultName={FB.getSavedUsername()||gameConfig?.playerName} onSave={saveGlobalWin} onSkip={()=>setShowUsernamePrompt(false)}/>}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
