<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── CSS DESIGN TOKENS ── easy to swap for your Canva theme ─────── */
    :root {
      --font-display: 'Syne', sans-serif;
      --font-body:    'Outfit', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      /* Brand palette */
      --col-bg:           #06080f;
      --col-bg2:          #0c1120;
      --col-surface:      rgba(255,255,255,0.04);
      --col-surface-high: rgba(255,255,255,0.07);
      --col-glass:        rgba(12,17,32,0.75);
      --col-border:       rgba(255,255,255,0.08);
      --col-border-hi:    rgba(255,255,255,0.15);

      --col-p1:           #ff3d6b;   /* player 1  — vivid rose  */
      --col-p1-glow:      #ff3d6b44;
      --col-p1-dim:       #7a1a30;
      --col-p2:           #fbbf24;   /* player 2  — golden      */
      --col-p2-glow:      #fbbf2444;
      --col-p2-dim:       #7a5a10;
      --col-bot:          #a78bfa;   /* bot       — violet      */
      --col-bot-glow:     #a78bfa44;
      --col-accent:       #38bdf8;   /* advisor   — sky cyan    */
      --col-accent-glow:  #38bdf822;

      --col-board:        #0d1b36;
      --col-board-rim:    #162444;
      --col-hole:         #050c1a;

      --col-text:         #f0f4ff;
      --col-text-muted:   rgba(240,244,255,0.45);
      --col-text-dim:     rgba(240,244,255,0.25);

      --col-success:      #34d399;
      --col-danger:       #f87171;
      --col-timer:        #fbbf24;

      /* Layout */
      --board-max:  520px;
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  22px;
      --radius-xl:  32px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      min-height: 100vh;
      background: var(--col-bg);
      color: var(--col-text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--col-border-hi); border-radius: 4px; }

    /* Dot-grid background texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(255,61,107,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 75%, rgba(167,139,250,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 55% 50%, rgba(56,189,248,0.04) 0%, transparent 70%);
    }

    #root { position: relative; z-index: 1; }

    /* ── Global element styles ─────────────────────────────────────── */
    input[type=text], input[type=number] {
      background: var(--col-surface-high);
      border: 1px solid var(--col-border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--col-text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus, input[type=number]:focus {
      border-color: var(--col-accent);
      box-shadow: 0 0 0 3px var(--col-accent-glow);
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--col-border-hi);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--col-accent);
      box-shadow: 0 0 8px var(--col-accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    label {
      color: var(--col-text-muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    button { font-family: var(--font-body); cursor: pointer; }
    button:active:not(:disabled) { transform: scale(0.96) !important; }

    /* ── Keyframes ──────────────────────────────────────────────────── */
    @keyframes dropIn {
      0%   { transform: translateY(-340%) scaleX(0.9); opacity: 0; }
      65%  { transform: translateY(6%) scaleX(1.04); opacity: 1; }
      82%  { transform: translateY(-3%) scaleX(0.98); }
      100% { transform: translateY(0) scaleX(1); opacity: 1; }
    }
    @keyframes winPulse {
      0%, 100% { box-shadow: 0 0 0 2px #fff, 0 0 18px currentColor, 0 0 40px currentColor; }
      50%       { box-shadow: 0 0 0 4px #fff, 0 0 30px currentColor, 0 0 60px currentColor; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes advisorPing {
      0%   { transform: scale(1);    opacity: 1; }
      60%  { transform: scale(2.2);  opacity: 0; }
      100% { transform: scale(1);    opacity: 0; }
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes timerFlash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    @keyframes colHoverBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes statReveal {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKEN BRIDGE  (mirrors CSS vars for inline styles)
    ════════════════════════════════════════════════════════════════ */
    const T = {
      p1:       'var(--col-p1)',
      p1Glow:   'var(--col-p1-glow)',
      p2:       'var(--col-p2)',
      p2Glow:   'var(--col-p2-glow)',
      bot:      'var(--col-bot)',
      botGlow:  'var(--col-bot-glow)',
      accent:   'var(--col-accent)',
      accentG:  'var(--col-accent-glow)',
      success:  'var(--col-success)',
      danger:   'var(--col-danger)',
      timer:    'var(--col-timer)',
      text:     'var(--col-text)',
      muted:    'var(--col-text-muted)',
      dim:      'var(--col-text-dim)',
      surface:  'var(--col-surface)',
      surfaceH: 'var(--col-surface-high)',
      glass:    'var(--col-glass)',
      border:   'var(--col-border)',
      borderHi: 'var(--col-border-hi)',
      board:    'var(--col-board)',
      boardRim: 'var(--col-board-rim)',
    };

    /* ═══════════════════════════════════════════════════════════════
       CONSTANTS
    ════════════════════════════════════════════════════════════════ */
    const ROWS = 6, COLS = 7;
    const EMPTY = null, P1 = 'P1', P2 = 'P2', BOT = 'BOT';
    const STORAGE_KEY = 'c4_game_state', LB_KEY = 'c4_leaderboard';
    const DEFAULT_TIMER = 15;

    /* ═══════════════════════════════════════════════════════════════
       GAME LOGIC  (unchanged from original)
    ════════════════════════════════════════════════════════════════ */
    const makeBoard = () => Array(ROWS).fill(null).map(() => Array(COLS).fill(EMPTY));

    function dropPiece(board, col, player) {
      const next = board.map(r => [...r]);
      for (let r = ROWS - 1; r >= 0; r--) {
        if (next[r][col] === EMPTY) { next[r][col] = player; return next; }
      }
      return null;
    }
    function getDropRow(board, col) {
      for (let r = ROWS - 1; r >= 0; r--)
        if (board[r][col] === EMPTY) return r;
      return -1;
    }
    function checkWinner(board) {
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const p = board[r][c]; if (!p) continue;
        for (const [dr,dc] of dirs) {
          let cells = [[r,c]];
          for (let i = 1; i < 4; i++) {
            const nr=r+dr*i, nc=c+dc*i;
            if (nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p) break;
            cells.push([nr,nc]);
          }
          if (cells.length === 4) return { winner: p, cells };
        }
      }
      return null;
    }
    function isDraw(board) { return board[0].every(c => c !== EMPTY); }
    function isValidCol(board, col) { return col>=0 && col<COLS && board[0][col]===EMPTY; }

    function scoreWindow(win, player, opp) {
      const p=win.filter(c=>c===player).length, e=win.filter(c=>c===EMPTY).length, o=win.filter(c=>c===opp).length;
      if (o>0) return 0;
      if (p===4) return 100; if (p===3&&e===1) return 5; if (p===2&&e===2) return 2;
      return 0;
    }
    function scoreBoard(board, player) {
      const opp = player===P1?P2:P1; let score=0;
      const cc=Math.floor(COLS/2);
      score += board.map(r=>r[cc]).filter(c=>c===player).length * 3;
      for (let r=0;r<ROWS;r++) for (let c=0;c<=COLS-4;c++) score+=scoreWindow(board[r].slice(c,c+4),player,opp);
      for (let c=0;c<COLS;c++) for (let r=0;r<=ROWS-4;r++) score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c]),player,opp);
      for (let r=0;r<=ROWS-4;r++) for (let c=0;c<=COLS-4;c++) {
        score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c+i]),player,opp);
        score+=scoreWindow([0,1,2,3].map(i=>board[r+3-i][c+i]),player,opp);
      }
      return score;
    }
    function getBotMove(board, botPlayer) {
      const opp=botPlayer===P1?P2:P1, cols=[3,2,4,1,5,0,6];
      for (const c of cols) { if (!isValidCol(board,c)) continue; const n=dropPiece(board,c,botPlayer); if (n&&checkWinner(n)) return c; }
      for (const c of cols) { if (!isValidCol(board,c)) continue; const n=dropPiece(board,c,opp);       if (n&&checkWinner(n)) return c; }
      let best=-Infinity, bestCol=cols[0];
      for (const c of cols) {
        if (!isValidCol(board,c)) continue;
        const n=dropPiece(board,c,botPlayer); if (!n) continue;
        const s=scoreBoard(n,botPlayer)-scoreBoard(n,opp)*0.8;
        if (s>best) { best=s; bestCol=c; }
      }
      return bestCol;
    }
    const getAdvisorCol = (board, player) => getBotMove(board, player);

    /* ═══════════════════════════════════════════════════════════════
       LEADERBOARD HELPERS
    ════════════════════════════════════════════════════════════════ */
    const loadLB = () => { try { return JSON.parse(localStorage.getItem(LB_KEY)) || {}; } catch { return {}; } };
    const saveLB = lb => localStorage.setItem(LB_KEY, JSON.stringify(lb));
    function addWin(name) { const lb=loadLB(); lb[name]=(lb[name]||0)+1; saveLB(lb); }

    /* ═══════════════════════════════════════════════════════════════
       PLAYER COLOR HELPER
    ════════════════════════════════════════════════════════════════ */
    const playerColor = p => p===P1 ? T.p1 : p===BOT ? T.bot : T.p2;
    const playerGlow  = p => p===P1 ? T.p1Glow : p===BOT ? T.botGlow : T.p2Glow;

    /* ═══════════════════════════════════════════════════════════════
       PIECE COMPONENT  — tactile, glowing, animated
    ════════════════════════════════════════════════════════════════ */
    function Piece({ player, isNew, isWinner }) {
      if (!player) {
        return (
          <div style={{
            width:'100%', aspectRatio:'1', borderRadius:'50%',
            background:'var(--col-hole)',
            boxShadow:'inset 0 3px 10px rgba(0,0,0,0.8), inset 0 1px 3px rgba(0,0,0,0.9)',
            border:'1px solid rgba(0,0,0,0.5)',
          }} />
        );
      }
      const col = playerColor(player);
      return (
        <div style={{ position:'relative', width:'100%', aspectRatio:'1' }}>
          {/* Outer glow ring when winning */}
          {isWinner && (
            <div style={{
              position:'absolute', inset:'-3px', borderRadius:'50%',
              border:`2px solid ${col}`,
              animation:'winPulse 0.9s ease-in-out infinite',
              color: col,
            }} />
          )}
          {/* The piece */}
          <div style={{
            width:'100%', height:'100%', borderRadius:'50%',
            background: `radial-gradient(circle at 35% 32%, ${col}ff 0%, ${col}cc 45%, ${col}88 100%)`,
            boxShadow: isWinner
              ? `inset 0 -3px 8px rgba(0,0,0,0.4), 0 0 20px ${col}, 0 0 45px ${col}88`
              : `inset 0 -4px 10px rgba(0,0,0,0.5), inset 0 3px 6px rgba(255,255,255,0.18), 0 4px 14px ${col}55`,
            animation: isNew ? 'dropIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards'
                      : isWinner ? 'winPulse 0.9s ease-in-out infinite' : 'none',
            transformOrigin: 'top center',
            transition: 'box-shadow 0.3s ease',
            /* Specular highlight overlay */
            position:'relative', overflow:'hidden',
          }}>
            <div style={{
              position:'absolute', top:'12%', left:'18%',
              width:'35%', height:'22%', borderRadius:'50%',
              background:'rgba(255,255,255,0.22)',
              filter:'blur(2px)',
              transform:'rotate(-20deg)',
            }} />
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       TIMER BAR
    ════════════════════════════════════════════════════════════════ */
    function TimerBar({ seconds, max }) {
      const pct = (seconds / max) * 100;
      const col = pct > 55 ? 'var(--col-success)' : pct > 28 ? 'var(--col-timer)' : 'var(--col-danger)';
      return (
        <div style={{ width:'100%', height:5, background:'rgba(255,255,255,0.07)', borderRadius:3, overflow:'hidden' }}>
          <div style={{
            height:'100%', width:`${pct}%`, borderRadius:3,
            background: col,
            boxShadow: `0 0 8px ${col}`,
            transition:'width 1s linear, background 0.4s ease, box-shadow 0.4s ease',
          }} />
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       GLASS MODAL OVERLAY
    ════════════════════════════════════════════════════════════════ */
    function ModalOverlay({ children, onClose }) {
      return (
        <div
          onClick={onClose}
          style={{
            position:'fixed', inset:0, zIndex:100,
            background:'rgba(4,6,16,0.82)',
            backdropFilter:'blur(10px)',
            display:'flex', alignItems:'center', justifyContent:'center',
            padding:'16px',
            animation:'overlayIn 0.25s ease forwards',
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              background:'rgba(14,22,45,0.92)',
              border:'1px solid var(--col-border-hi)',
              borderRadius:'var(--radius-lg)',
              padding:'32px 28px 28px',
              maxWidth:440, width:'100%',
              maxHeight:'88vh', overflowY:'auto',
              backdropFilter:'blur(20px)',
              boxShadow:'0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04)',
              animation:'fadeSlideUp 0.3s cubic-bezier(0.22,1,0.36,1) forwards',
            }}
          >
            {children}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       LEADERBOARD MODAL
    ════════════════════════════════════════════════════════════════ */
    function LeaderboardModal({ onClose }) {
      const lb = loadLB();
      const sorted = Object.entries(lb).sort((a,b)=>b[1]-a[1]);
      const medals = ['🥇','🥈','🥉'];

      return (
        <ModalOverlay onClose={onClose}>
          <div style={{ marginBottom:24 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
              <span style={{ fontSize:28 }}>🏆</span>
              <h2 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:800, letterSpacing:'-0.02em', color:T.text }}>
                Leaderboard
              </h2>
            </div>
            <p style={{ color:T.muted, fontSize:13 }}>All-time wins across every session</p>
          </div>

          {sorted.length === 0 ? (
            <div style={{ textAlign:'center', padding:'32px 0', color:T.muted, fontSize:14 }}>
              No wins recorded yet. Play a game!
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {sorted.map(([name, wins], i) => (
                <div key={name} style={{
                  display:'flex', alignItems:'center', gap:12,
                  padding:'12px 16px',
                  borderRadius:'var(--radius-md)',
                  background: i===0 ? 'rgba(251,191,36,0.08)' : T.surface,
                  border: `1px solid ${i===0?'rgba(251,191,36,0.2)':T.border}`,
                  animation: `statReveal 0.3s ease ${i*0.06}s both`,
                }}>
                  <span style={{ fontSize:20, minWidth:28, textAlign:'center' }}>
                    {medals[i] ?? <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:T.muted }}>#{i+1}</span>}
                  </span>
                  <span style={{ flex:1, fontWeight:600, fontSize:15, color:T.text }}>{name}</span>
                  <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                    <span style={{ fontFamily:'var(--font-mono)', fontWeight:600, fontSize:20, color: i===0?T.p2:T.accent }}>{wins}</span>
                    <span style={{ fontSize:11, color:T.muted }}>wins</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          <button
            onClick={onClose}
            style={{
              marginTop:24, width:'100%', padding:'12px',
              borderRadius:'var(--radius-md)',
              border:'1px solid var(--col-border-hi)',
              background:'var(--col-surface-high)',
              color:T.text, fontWeight:600, fontSize:14,
              transition:'all 0.15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}
            onMouseLeave={e=>e.currentTarget.style.background='var(--col-surface-high)'}
          >
            Close
          </button>
        </ModalOverlay>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       POST-GAME MODAL
    ════════════════════════════════════════════════════════════════ */
    function PostGameModal({ stats, onRematch, onMenu }) {
      const { winner, moves, elapsed, p1Name, p2Name, p1Times, p2Times, isDraw: draw, mode } = stats;
      const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : '—';
      const wName = winner===P1 ? p1Name : winner===BOT ? 'Bot' : p2Name;
      const wColor = winner ? playerColor(winner) : T.muted;

      function getCommentary() {
        if (draw) return "A perfectly balanced match! Neither side gave an inch. True rivals.";
        const a1=avg(p1Times), a2=avg(p2Times);
        const fast = a1!=='—'&&a2!=='—'&&a1<a2 ? p1Name : p2Name;
        if (moves < 14) return `Lightning fast! ${wName} secured the win in just ${moves} moves. Decisive and ruthless.`;
        if (moves > 30) return `A grueling war of attrition across ${moves} moves. ${wName} outlasted the pressure to claim victory.`;
        if (a1!=='—'&&a2!=='—'&&Math.abs(a1-a2)>5) return `${fast} played with blazing speed while their opponent took time to think. ${wName} took the win.`;
        return `A well-contested match! ${wName} read the board brilliantly and connected four to clinch it in ${moves} moves.`;
      }

      const statItems = [
        { label:'Total Moves',  val: moves,     icon:'🎯' },
        { label:'Time Elapsed', val:`${elapsed}s`, icon:'⏱' },
        { label:`${p1Name} avg/move`, val:`${avg(p1Times)}s`, icon:'🔴' },
        { label:`${mode===2?p2Name:'Bot'} avg/move`, val:`${avg(p2Times)}s`, icon: mode===2?'🟡':'🤖' },
      ];

      return (
        <ModalOverlay>
          {/* Winner badge */}
          <div style={{ textAlign:'center', marginBottom:24 }}>
            <div style={{
              display:'inline-flex', alignItems:'center', justifyContent:'center',
              width:72, height:72, borderRadius:'50%', marginBottom:16,
              background: draw ? T.surface : `${wColor}18`,
              border: `2px solid ${draw ? T.border : wColor}`,
              fontSize:32,
              boxShadow: draw ? 'none' : `0 0 24px ${wColor}44`,
            }}>
              {draw ? '🤝' : '🏆'}
            </div>
            <h2 style={{
              fontFamily:'var(--font-display)', fontSize:28, fontWeight:800,
              letterSpacing:'-0.03em',
              color: draw ? T.muted : wColor,
              textShadow: draw ? 'none' : `0 0 20px ${wColor}88`,
              marginBottom:8,
            }}>

    /* ═══════════════════════════════════════════════════════════════
       GAME SCREEN
    ════════════════════════════════════════════════════════════════ */
    function GameScreen({ config, onMenu }) {
      const { mode, p1Name, p2Name, timerSec } = config;
      const p2Label = mode===2 ? p2Name : 'Bot';
      const p2Token = mode===2 ? P2 : BOT;

      const [board, setBoard]       = useState(makeBoard());
      const [current, setCurrent]   = useState(P1);
      const [winInfo, setWinInfo]   = useState(null);
      const [drawGame, setDrawGame] = useState(false);
      const [newCell, setNewCell]   = useState(null);
      const [hoverCol, setHoverCol] = useState(null);
      const [advisorCol, setAdvisorCol]   = useState(null);
      const [advisorUsed, setAdvisorUsed] = useState(false);
      const [timerLeft, setTimerLeft] = useState(timerSec);
      const [showLB, setShowLB]         = useState(false);
      const [showPostGame, setShowPostGame] = useState(false);
      const [moveCount, setMoveCount]   = useState(0);
      const [gameStart]   = useState(Date.now());
      const [p1Times, setP1Times] = useState([]);
      const [p2Times, setP2Times] = useState([]);
      const [turnStart, setTurnStart] = useState(Date.now());
      const [gameOver, setGameOver]   = useState(false);
      const timerRef    = useRef(null);
      const botTimeout  = useRef(null);

      const isBotTurn = mode===1 && current===BOT;

      // persist state
      useEffect(() => {
        if (gameOver) { localStorage.removeItem(STORAGE_KEY); return; }
        const s = { board, current, p1Name, p2Name, timerSec, timerLeft, moveCount, p1Times, p2Times, mode, turnStart: Date.now() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
      }, [board, current, timerLeft]);

      // timer
      useEffect(() => {
        if (gameOver) return;
        clearInterval(timerRef.current);
        setTimerLeft(timerSec);
        setTurnStart(Date.now());
        timerRef.current = setInterval(() => {
          setTimerLeft(prev => {
            if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return timerSec; }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [current, gameOver]);

      // bot move
      useEffect(() => {
        if (!isBotTurn || gameOver) return;
        botTimeout.current = setTimeout(() => {
          doMove(getBotMove(board, BOT), BOT);
        }, 800);
        return () => clearTimeout(botTimeout.current);
      }, [current, gameOver]);

      function handleTimeout() {
        const el = Math.round((Date.now()-turnStart)/1000);
        if (current===P1) setP1Times(p=>[...p,el]); else setP2Times(p=>[...p,el]);
        setAdvisorCol(null); setAdvisorUsed(false);
        setCurrent(current===P1 ? p2Token : P1);
      }

      function doMove(col, player) {
        if (!isValidCol(board, col)) return;
        clearInterval(timerRef.current); clearTimeout(botTimeout.current);
        const row = getDropRow(board, col);
        const next = dropPiece(board, col, player);
        if (!next) return;
        setBoard(next);
        setNewCell([row, col]);
        setMoveCount(m=>m+1);
        const el = Math.round((Date.now()-turnStart)/1000);
        if (player===P1) setP1Times(p=>[...p,el]); else setP2Times(p=>[...p,el]);
        setAdvisorCol(null); setAdvisorUsed(false);
        setTimeout(() => setNewCell(null), 450);

        const win = checkWinner(next);
        if (win) {
          setWinInfo(win); setGameOver(true);
          addWin(player===P1 ? p1Name : p2Label);
          setTimeout(() => setShowPostGame(true), 950);
          return;
        }
        if (isDraw(next)) { setDrawGame(true); setGameOver(true); setTimeout(()=>setShowPostGame(true),500); return; }
        setCurrent(player===P1 ? p2Token : P1);
      }

      function handleColClick(col) {
        if (gameOver || isBotTurn || !isValidCol(board, col)) return;
        doMove(col, current);
      }
      function handleAdvisor() {
        if (gameOver || isBotTurn || advisorUsed) return;
        setAdvisorCol(getAdvisorCol(board, current));
        setAdvisorUsed(true);
      }
      function handleRematch() {
        setBoard(makeBoard()); setCurrent(P1); setWinInfo(null); setDrawGame(false);
        setNewCell(null); setAdvisorCol(null); setAdvisorUsed(false); setMoveCount(0);
        setP1Times([]); setP2Times([]); setShowPostGame(false); setGameOver(false); setTimerLeft(timerSec);
      }

      const curColor = playerColor(current);
      const curGlow  = playerGlow(current);
      const elapsedS = Math.round((Date.now()-gameStart)/1000);

      /* Cell size: clamp so board fits on small screens */
      const cellPx = 'min(calc((min(100vw,520px) - 56px) / 7), 64px)';

      return (
        <div style={{
          minHeight:'100vh', display:'flex', flexDirection:'column',
          alignItems:'center', padding:'20px 12px 32px', position:'relative',
        }}>

          {/* ── Top nav bar ── */}
          <div style={{
            width:'100%', maxWidth:560,
            display:'flex', alignItems:'center', justifyContent:'space-between',
            marginBottom:20,
          }}>
            <button
              onClick={onMenu}
              style={{
                padding:'8px 14px', borderRadius:'var(--radius-sm)',
                border:'1px solid var(--col-border)',
                background:T.surface, color:T.muted, fontSize:13, fontWeight:600,
                transition:'all 0.15s',
              }}
              onMouseEnter={e=>{ e.currentTarget.style.borderColor=T.borderHi; e.currentTarget.style.color=T.text; }}
              onMouseLeave={e=>{ e.currentTarget.style.borderColor=T.border; e.currentTarget.style.color=T.muted; }}
            >
              ← Menu
            </button>

            <h1 style={{
              fontFamily:'var(--font-display)', fontWeight:800, fontSize:20,
              letterSpacing:'-0.03em', color:T.text,
            }}>
              Connect Four
            </h1>

            <button
              onClick={() => setShowLB(true)}
              style={{
                padding:'8px 14px', borderRadius:'var(--radius-sm)',
                border:`1px solid rgba(251,191,36,0.3)`,
                background:'rgba(251,191,36,0.06)', color:T.p2, fontSize:13, fontWeight:700,
                transition:'all 0.15s',
              }}
              onMouseEnter={e=>{ e.currentTarget.style.background='rgba(251,191,36,0.12)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='rgba(251,191,36,0.06)'; }}
            >
              🏆 Board
            </button>
          </div>

          {/* ── Player cards + timer ── */}
          <div style={{ width:'100%', maxWidth:560, marginBottom:16, display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ display:'flex', gap:10, alignItems:'stretch' }}>
              <PlayerCard
                name={p1Name} color={T.p1} glow={T.p1Glow}
                active={current===P1 && !gameOver}
              />
              <div style={{
                display:'flex', alignItems:'center', justifyContent:'center',
                padding:'0 6px', color:T.dim, fontSize:12, fontWeight:700,
                letterSpacing:'0.1em',
              }}>
                VS
              </div>
              <PlayerCard
                name={p2Label}
                color={mode===2 ? T.p2 : T.bot}
                glow={mode===2 ? T.p2Glow : T.botGlow}
                active={current!==P1 && !gameOver}
                right
              />
            </div>

            {/* Timer strip */}
            {!gameOver ? (
              <div style={{
                background:'rgba(12,17,32,0.6)',
                border:'1px solid var(--col-border)',
                borderRadius:'var(--radius-md)',
                padding:'10px 16px',
                backdropFilter:'blur(8px)',
              }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                    {isBotTurn && (
                      <div style={{
                        width:8, height:8, borderRadius:'50%',
                        background:T.bot, animation:'pulse 0.8s ease-in-out infinite',
                        boxShadow:`0 0 6px ${T.bot}`,
                      }} />
                    )}
                    <span style={{
                      fontSize:12, fontWeight:700,
                      color: isBotTurn ? T.bot : curColor,
                      letterSpacing:'0.06em', textTransform:'uppercase',
                    }}>
                      {isBotTurn ? 'Bot thinking…' : `${current===P1?p1Name:p2Label}'s turn`}
                    </span>
                  </div>
                  <span style={{
                    fontFamily:'var(--font-mono)', fontWeight:600, fontSize:16,
                    color: timerLeft<=5 ? T.danger : timerLeft<=10 ? T.timer : T.muted,
                    animation: timerLeft<=5 ? 'timerFlash 0.5s ease-in-out infinite' : 'none',
                  }}>
                    {timerLeft}s
                  </span>
                </div>
                <TimerBar seconds={timerLeft} max={timerSec} />
              </div>
            ) : (
              <div style={{
                textAlign:'center', padding:'12px',
                borderRadius:'var(--radius-md)',
                background: drawGame ? T.surface : `${winInfo?playerColor(winInfo.winner):T.muted}14`,
                border:`1px solid ${drawGame?T.border:winInfo?playerColor(winInfo.winner):T.muted}44`,
                fontWeight:800, fontSize:16,
                color: drawGame ? T.muted : winInfo ? playerColor(winInfo.winner) : T.muted,
              }}>
                {drawGame ? "🤝 It's a Draw!" : `🎉 ${winInfo?.winner===P1?p1Name:p2Label} wins!`}
              </div>
            )}
          </div>

          {/* ── THE BOARD ── */}
          <div
            onMouseLeave={() => setHoverCol(null)}
            style={{
              width:'100%', maxWidth:560,
              background:'linear-gradient(160deg, #0e1f3d 0%, #091628 100%)',
              borderRadius:'var(--radius-xl)',
              padding:'14px 14px 10px',
              border:'2px solid var(--col-board-rim)',
              boxShadow:`
                0 24px 64px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.04),
                inset 0 1px 0 rgba(255,255,255,0.06)
              `,
              position:'relative',
            }}
          >
            {/* Column hover / advisor indicators */}
            <div style={{ display:'grid', gridTemplateColumns:`repeat(${COLS},1fr)`, gap:6, marginBottom:6, height:16 }}>
              {Array(COLS).fill(0).map((_,c) => {
                const isAdvisor = advisorCol===c;
                const isHov = hoverCol===c && !isBotTurn && !gameOver && isValidCol(board,c);
                return (
                  <div key={c} style={{ display:'flex', justifyContent:'center', alignItems:'center', position:'relative' }}>
                    {(isAdvisor || isHov) && (
                      <>
                        {/* Main drop arrow */}
                        <div style={{
                          width:10, height:10, borderRadius:'50%',
                          background: isAdvisor ? T.accent : curColor,
                          boxShadow: isAdvisor ? `0 0 10px ${T.accent}` : `0 0 8px ${curColor}`,
                          animation: isAdvisor ? 'colHoverBounce 0.6s ease-in-out infinite' : 'colHoverBounce 0.8s ease-in-out infinite',
                        }} />
                        {/* Ping ripple for advisor */}
                        {isAdvisor && (
                          <div style={{
                            position:'absolute', width:20, height:20, borderRadius:'50%',
                            border:`2px solid ${T.accent}`,
                            animation:'advisorPing 1.1s ease-out infinite',
                          }} />
                        )}
                      </>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Grid rows */}
            {board.map((row, r) => (
              <div
                key={r}
                style={{
                  display:'grid',
                  gridTemplateColumns:`repeat(${COLS},1fr)`,
                  gap:6,
                  marginBottom: r<ROWS-1 ? 6 : 0,
                }}
              >
                {row.map((cell, c) => {
                  const isWinCell = winInfo?.cells.some(([wr,wc])=>wr===r&&wc===c);
                  const isNew = newCell?.[0]===r && newCell?.[1]===c;
                  const isHovCol = hoverCol===c && !isBotTurn && !gameOver && isValidCol(board,c);
                  const isAdvCol = advisorCol===c && !cell;

                  return (
                    <div
                      key={c}
                      onClick={() => handleColClick(c)}
                      onMouseEnter={() => setHoverCol(c)}
                      style={{
                        borderRadius:'var(--radius-sm)',
                        padding:3,
                        cursor: (!gameOver&&!isBotTurn&&isValidCol(board,c)) ? 'pointer' : 'default',
                        background: isAdvCol
                          ? 'rgba(56,189,248,0.08)'
                          : isHovCol
                          ? 'rgba(255,255,255,0.04)'
                          : 'transparent',
                        outline: isAdvCol ? `1.5px solid rgba(56,189,248,0.3)` : 'none',
                        outlineOffset: -2,
                        transition:'background 0.15s',
                      }}
                    >
                      <Piece player={cell} isNew={isNew} isWinner={isWinCell} />
                    </div>
                  );
                })}
              </div>
            ))}

            {/* Board branding strip */}
            <div style={{
              marginTop:10,
              textAlign:'center',
              color:'rgba(255,255,255,0.08)',
              fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase',
              fontWeight:700, fontFamily:'var(--font-display)',
            }}>
              Connect Four
            </div>
          </div>

          {/* ── Action row ── */}
          <div style={{ marginTop:16, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap', justifyContent:'center' }}>
            {!gameOver && !isBotTurn && (
              <AdvisorButton onAdvisor={handleAdvisor} used={advisorUsed} disabled={gameOver||isBotTurn} />
            )}
            {gameOver && (
              <>
                <button
                  onClick={handleRematch}
                  style={{
                    padding:'10px 24px', borderRadius:'var(--radius-md)',
                    border:'none',
                    background:`linear-gradient(135deg, ${T.accent} 0%, #0ea5e9 100%)`,
                    color:'#020c16', fontWeight:800, fontSize:14,
                    boxShadow:`0 4px 18px rgba(56,189,248,0.4)`,
                    transition:'all 0.15s',
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.transform='scale(1.04)'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.transform='scale(1)'; }}
                >
                  Rematch
                </button>
                <button
                  onClick={onMenu}
                  style={{
                    padding:'10px 24px', borderRadius:'var(--radius-md)',
                    border:`1px solid ${T.borderHi}`,
                    background:T.surface, color:T.text, fontWeight:600, fontSize:14,
                    transition:'all 0.15s',
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.background=T.surfaceH; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=T.surface; }}
                >
                  Menu
                </button>
              </>
            )}
          </div>

          {/* Move counter */}
          <div style={{ marginTop:12, color:T.dim, fontSize:11, fontFamily:'var(--font-mono)', letterSpacing:'0.05em' }}>
            MOVE #{moveCount} · {Math.round((Date.now()-gameStart)/1000)}s
          </div>

          {/* Modals */}
          {showLB && <LeaderboardModal onClose={() => setShowLB(false)} />}
          {showPostGame && (
            <PostGameModal
              stats={{
                winner: winInfo?.winner,
                isDraw: drawGame,
                moves: moveCount,
                elapsed: Math.round((Date.now()-gameStart)/1000),
                p1Name, p2Name: p2Label, p1Times, p2Times, mode,
              }}
              onRematch={() => { setShowPostGame(false); handleRematch(); }}
              onMenu={() => { setShowPostGame(false); onMenu(); }}
            />
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       ROOT
    ════════════════════════════════════════════════════════════════ */
    function App() {
      const [screen, setScreen]     = useState('setup');
      const [gameConfig, setConfig] = useState(null);
      const [savedGame, setSaved]   = useState(null);

      useEffect(() => {
        try { const r=localStorage.getItem(STORAGE_KEY); if(r) setSaved(JSON.parse(r)); } catch {}
      }, []);

      function handleStart(cfg, resume=false) {
        if (resume && savedGame) {
          setConfig({ mode:savedGame.mode, p1Name:savedGame.p1Name, p2Name:savedGame.p2Name, timerSec:savedGame.timerSec, resumeState:savedGame });
        } else {
          setConfig(cfg); setSaved(null);
        }
        setScreen('game');
      }
      function handleMenu() {
        setScreen('setup'); setConfig(null);
        try { const r=localStorage.getItem(STORAGE_KEY); if(r) setSaved(JSON.parse(r)); } catch {}
      }

      return (
        screen==='setup'
          ? <SetupScreen onStart={handleStart} savedGame={savedGame} />
          : <GameScreen config={gameConfig} onMenu={handleMenu} />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
