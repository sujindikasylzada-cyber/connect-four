<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── CSS DESIGN TOKENS ───────────────────────────────────────── */
    :root {
      --font-display: 'Syne', sans-serif;
      --font-body:    'Outfit', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      /* Brand palette */
      --col-bg:           #06080f;
      --col-bg2:          #0c1120;
      --col-surface:      rgba(255,255,255,0.04);
      --col-surface-high: rgba(255,255,255,0.07);
      --col-glass:        rgba(12,17,32,0.75);
      --col-border:       rgba(255,255,255,0.08);
      --col-border-hi:    rgba(255,255,255,0.15);

      --col-p1:           #ff3d6b;   /* player 1  — vivid rose  */
      --col-p1-glow:      #ff3d6b44;
      --col-p1-dim:       #7a1a30;
      --col-p2:           #fbbf24;   /* player 2  — golden      */
      --col-p2-glow:      #fbbf2444;
      --col-p2-dim:       #7a5a10;
      --col-bot:          #a78bfa;   /* bot       — violet      */
      --col-bot-glow:     #a78bfa44;
      --col-accent:       #38bdf8;   /* advisor   — sky cyan    */
      --col-accent-glow:  #38bdf822;

      --col-board:        #0e1f3d;
      --col-board-rim:    #162444;
      --col-hole:         #050c1a;

      --col-text:         #f0f4ff;
      --col-text-muted:   rgba(240,244,255,0.45);
      --col-text-dim:     rgba(240,244,255,0.25);

      --col-success:      #34d399;
      --col-danger:       #f87171;
      --col-timer:        #fbbf24;

      /* Layout */
      --board-max:  520px;
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  22px;
      --radius-xl:  32px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      min-height: 100vh;
      background: var(--col-bg);
      color: var(--col-text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--col-border-hi); border-radius: 4px; }

    /* Dot-grid background texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(255,61,107,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 75%, rgba(167,139,250,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 55% 50%, rgba(56,189,248,0.04) 0%, transparent 70%);
    }

    #root { position: relative; z-index: 1; }

    /* ── Global element styles ─────────────────────────────────────── */
    input[type=text], input[type=number] {
      background: var(--col-surface-high);
      border: 1px solid var(--col-border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--col-text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus, input[type=number]:focus {
      border-color: var(--col-accent);
      box-shadow: 0 0 0 3px var(--col-accent-glow);
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--col-border-hi);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--col-accent);
      box-shadow: 0 0 8px var(--col-accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    label {
      color: var(--col-text-muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    button { font-family: var(--font-body); cursor: pointer; border: none; background: none; }
    button:active:not(:disabled) { transform: scale(0.96) !important; }

    /* ── Keyframes ──────────────────────────────────────────────────── */
    @keyframes dropIn {
      0%   { transform: translateY(-340%) scaleX(0.9); opacity: 0; }
      65%  { transform: translateY(6%) scaleX(1.04); opacity: 1; }
      82%  { transform: translateY(-3%) scaleX(0.98); }
      100% { transform: translateY(0) scaleX(1); opacity: 1; }
    }
    @keyframes winPulse {
      0%, 100% { box-shadow: 0 0 0 2px #fff, 0 0 18px currentColor, 0 0 40px currentColor; }
      50%       { box-shadow: 0 0 0 4px #fff, 0 0 30px currentColor, 0 0 60px currentColor; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes advisorPing {
      0%   { transform: scale(1);    opacity: 1; }
      60%  { transform: scale(2.2);  opacity: 0; }
      100% { transform: scale(1);    opacity: 0; }
    }
    @keyframes timerFlash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    @keyframes colHoverBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes statReveal {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Responsive PC Layout System ────────────────────────────────── */
    .game-layout-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    @media (min-width: 1024px) {
      .game-layout-container {
        grid-template-columns: 280px 1fr 300px;
        max-width: 1200px;
        align-items: start;
      }
      .side-column {
        display: flex !important;
        flex-direction: column;
        gap: 16px;
      }
    }

    .pro-badge {
      background: linear-gradient(90deg, #ff9900, #ff5500);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 6px;
      color: white;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════════
       DESIGN TOKEN BRIDGE
    ════════════════════════════════════════════════════════════════ */
    const T = {
      p1:       'var(--col-p1)',
      p1Glow:   'var(--col-p1-glow)',
      p2:       'var(--col-p2)',
      p2Glow:   'var(--col-p2-glow)',
      bot:      'var(--col-bot)',
      botGlow:  'var(--col-bot-glow)',
      accent:   'var(--col-accent)',
      accentG:  'var(--col-accent-glow)',
      success:  'var(--col-success)',
      danger:   'var(--col-danger)',
      timer:    'var(--col-timer)',
      text:     'var(--col-text)',
      muted:    'var(--col-text-muted)',
      dim:      'var(--col-text-dim)',
      surface:  'var(--col-surface)',
      surfaceH: 'var(--col-surface-high)',
      glass:    'var(--col-glass)',
      border:   'var(--col-border)',
      borderHi: 'var(--col-border-hi)',
      board:    'var(--col-board)',
      boardRim: 'var(--col-board-rim)',
    };

    const ROWS = 6, COLS = 7;
    const EMPTY = null, P1 = 'P1', P2 = 'P2', BOT = 'BOT';
    const STORAGE_KEY = 'c4_game_state', LB_KEY = 'c4_leaderboard';
    const DEFAULT_TIMER = 15;

    // ── FIREBASE CONFIGURATION (Placeholder config until you swap) ──
    const firebaseConfig = {
  apiKey: "AIzaSyBcmBXMsc4mYhPmwurhF2eKHhXg3FxXCfo",
  authDomain: "connect-four-4a891.firebaseapp.com",
  projectId: "connect-four-4a891",
  storageBucket: "connect-four-4a891.firebasestorage.app",
  messagingSenderId: "19663690424",
  appId: "1:19663690424:web:29af7223c3a46aaa78324d",
  measurementId: "G-555VKTWK8N"
};

    let db = null;
    try {
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      }
    } catch (e) {
      console.error("Firebase failed to initialize:", e);
    }

    /* ═══════════════════════════════════════════════════════════════
       GAME LOGIC FUNCTIONS
    ════════════════════════════════════════════════════════════════ */
    const makeBoard = () => Array(ROWS).fill(null).map(() => Array(COLS).fill(EMPTY));

    function dropPiece(board, col, player) {
      const next = board.map(r => [...r]);
      for (let r = ROWS - 1; r >= 0; r--) {
        if (next[r][col] === EMPTY) { next[r][col] = player; return next; }
      }
      return null;
    }
    function getDropRow(board, col) {
      for (let r = ROWS - 1; r >= 0; r--)
        if (board[r][col] === EMPTY) return r;
      return -1;
    }
    function checkWinner(board) {
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const p = board[r][c]; if (!p) continue;
        for (const [dr,dc] of dirs) {
          let cells = [[r,c]];
          for (let i = 1; i < 4; i++) {
            const nr=r+dr*i, nc=c+dc*i;
            if (nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p) break;
            cells.push([nr,nc]);
          }
          if (cells.length === 4) return { winner: p, cells };
        }
      }
      return null;
    }
    function isDraw(board) { return board[0].every(c => c !== EMPTY); }
    function isValidCol(board, col) { return col>=0 && col<COLS && board[0][col]===EMPTY; }

    function scoreWindow(win, player, opp) {
      const p=win.filter(c=>c===player).length, e=win.filter(c=>c===EMPTY).length, o=win.filter(c=>c===opp).length;
      if (o>0) return 0;
      if (p===4) return 100; if (p===3&&e===1) return 5; if (p===2&&e===2) return 2;
      return 0;
    }
    function scoreBoard(board, player) {
      const opp = player===P1?P2:P1; let score=0;
      const cc=Math.floor(COLS/2);
      score += board.map(r=>r[cc]).filter(c=>c===player).length * 3;
      for (let r=0;r<ROWS;r++) for (let c=0;c<=COLS-4;c++) score+=scoreWindow(board[r].slice(c,c+4),player,opp);
      for (let c=0;c<COLS;c++) for (let r=0;r<=ROWS-4;r++) score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c]),player,opp);
      for (let r=0;r<=ROWS-4;r++) for (let c=0;c<=COLS-4;c++) {
        score+=scoreWindow([0,1,2,3].map(i=>board[r+i][c+i]),player,opp);
        score+=scoreWindow([0,1,2,3].map(i=>board[r+3-i][c+i]),player,opp);
      }
      return score;
    }
    function getBotMove(board, botPlayer) {
      const opp=botPlayer===P1?P2:P1, cols=[3,2,4,1,5,0,6];
      for (const c of cols) { if (!isValidCol(board,c)) continue; const n=dropPiece(board,c,botPlayer); if (n&&checkWinner(n)) return c; }
      for (const c of cols) { if (!isValidCol(board,c)) continue; const n=dropPiece(board,c,opp);       if (n&&checkWinner(n)) return c; }
      let best=-Infinity, bestCol=cols[0];
      for (const c of cols) {
        if (!isValidCol(board,c)) continue;
        const n=dropPiece(board,c,botPlayer); if (!n) continue;
        const s=scoreBoard(n,botPlayer)-scoreBoard(n,opp)*0.8;
        if (s>best) { best=s; bestCol=c; }
      }
      return bestCol;
    }
    const getAdvisorCol = (board, player) => getBotMove(board, player);

    const loadLB = () => { try { return JSON.parse(localStorage.getItem(LB_KEY)) || {}; } catch { return {}; } };
    const saveLB = lb => localStorage.setItem(LB_KEY, JSON.stringify(lb));
    function addWin(name) { const lb=loadLB(); lb[name]=(lb[name]||0)+1; saveLB(lb); }

    const playerColor = p => p===P1 ? T.p1 : p===BOT ? T.bot : T.p2;
    const playerGlow  = p => p===P1 ? T.p1Glow : p===BOT ? T.botGlow : T.p2Glow;

    /* ═══════════════════════════════════════════════════════════════
       COMPONENTS
    ════════════════════════════════════════════════════════════════ */
    function Piece({ player, isNew, isWinner }) {
      if (!player) {
        return (
          <div style={{
            width:'100%', aspectRatio:'1', borderRadius:'50%',
            background:'var(--col-hole)',
            boxShadow:'inset 0 3px 10px rgba(0,0,0,0.8), inset 0 1px 3px rgba(0,0,0,0.9)',
            border:'1px solid rgba(0,0,0,0.5)',
          }} />
        );
      }
      const col = playerColor(player);
      return (
        <div style={{ position:'relative', width:'100%', aspectRatio:'1' }}>
          {isWinner && (
            <div style={{
              position:'absolute', inset:'-3px', borderRadius:'50%',
              border:`2px solid ${col}`,
              animation:'winPulse 0.9s ease-in-out infinite',
              color: col,
            }} />
          )}
          <div style={{
            width:'100%', height:'100%', borderRadius:'50%',
            background: `radial-gradient(circle at 35% 32%, ${col}ff 0%, ${col}cc 45%, ${col}88 100%)`,
            boxShadow: isWinner
              ? `inset 0 -3px 8px rgba(0,0,0,0.4), 0 0 20px ${col}, 0 0 45px ${col}88`
              : `inset 0 -4px 10px rgba(0,0,0,0.5), inset 0 3px 6px rgba(255,255,255,0.18), 0 4px 14px ${col}55`,
            animation: isNew ? 'dropIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards'
                      : isWinner ? 'winPulse 0.9s ease-in-out infinite' : 'none',
            transformOrigin: 'top center',
            transition: 'box-shadow 0.3s ease',
            position:'relative', overflow:'hidden',
          }}>
            <div style={{
              position:'absolute', top:'12%', left:'18%',
              width:'35%', height:'22%', borderRadius:'50%',
              background:'rgba(255,255,255,0.22)',
              filter:'blur(2px)',
              transform:'rotate(-20deg)',
            }} />
          </div>
        </div>
      );
    }

    function TimerBar({ seconds, max }) {
      const pct = (seconds / max) * 100;
      const col = pct > 55 ? 'var(--col-success)' : pct > 28 ? 'var(--col-timer)' : 'var(--col-danger)';
      return (
        <div style={{ width:'100%', height:5, background:'rgba(255,255,255,0.07)', borderRadius:3, overflow:'hidden' }}>
          <div style={{
            height:'100%', width:`${pct}%`, borderRadius:3,
            background: col,
            boxShadow: `0 0 8px ${col}`,
            transition:'width 1s linear, background 0.4s ease, box-shadow 0.4s ease',
          }} />
        </div>
      );
    }

    function ModalOverlay({ children, onClose }) {
      return (
        <div
          onClick={onClose}
          style={{
            position:'fixed', inset:0, zIndex:100,
            background:'rgba(4,6,16,0.82)',
            backdropFilter:'blur(10px)',
            display:'flex', alignItems:'center', justifyContent:'center',
            padding:'16px',
            animation:'overlayIn 0.25s ease forwards',
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              background:'rgba(14,22,45,0.92)',
              border:'1px solid var(--col-border-hi)',
              borderRadius:'var(--radius-lg)',
              padding:'32px 28px 28px',
              maxWidth:440, width:'100%',
              maxHeight:'88vh', overflowY:'auto',
              backdropFilter:'blur(20px)',
              boxShadow:'0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04)',
              animation:'fadeSlideUp 0.3s cubic-bezier(0.22,1,0.36,1) forwards',
            }}
          >
            {children}
          </div>
        </div>
      );
    }

    function ShopModal({ onClose }) {
      const [activeTab, setActiveTab] = useState('items');
      const [showProAlert, setShowProAlert] = useState(false);

      return (
        <ModalOverlay onClose={onClose}>
          <h2 style={{ marginBottom:20, fontFamily:'var(--font-display)', fontSize:22 }}>🛒 Кастомизация & Магазин</h2>
          
          <div style={{ display:'flex', gap:10, marginBottom:20 }}>
            <button onClick={()=>setActiveTab('items')} style={{ flex:1, padding:10, borderRadius:'var(--radius-sm)', border:`1px solid ${activeTab==='items'?T.accent:T.border}`, background:activeTab==='items'?'rgba(255,255,255,0.05)':T.surface, color:activeTab==='items'?T.accent:T.muted, fontWeight:700 }}>Фишки</button>
            <button onClick={()=>setActiveTab('boards')} style={{ flex:1, padding:10, borderRadius:'var(--radius-sm)', border:`1px solid ${activeTab==='boards'?T.accent:T.border}`, background:activeTab==='boards'?'rgba(255,255,255,0.05)':T.surface, color:activeTab==='boards'?T.accent:T.muted, fontWeight:700 }}>Доски</button>
          </div>

          {activeTab === 'items' ? (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              <div style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.accent}`, color:T.accent, textAlign:'center', fontWeight:600 }}>🔮 Сферы (On)</div>
              <div style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.border}`, textAlign:'center', opacity:0.6 }}>📦 Блоки</div>
              <div onClick={()=>setShowProAlert(true)} style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.border}`, textAlign:'center', cursor:'pointer' }}>💖 Сердечки <span className="pro-badge">PRO</span></div>
              <div onClick={()=>setShowProAlert(true)} style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.border}`, textAlign:'center', cursor:'pointer' }}>⭐ Звёзды <span className="pro-badge">PRO</span></div>
            </div>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              <div style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.accent}`, color:T.accent, textAlign:'center', fontWeight:600 }}>🌌 Neon Cyber</div>
              <div onClick={()=>setShowProAlert(true)} style={{ padding:12, borderRadius:'var(--radius-md)', background:T.surface, border:`1px solid ${T.border}`, textAlign:'center', cursor:'pointer' }}>👑 Royal Gold <span className="pro-badge">PRO</span></div>
            </div>
          )}

          <button onClick={onClose} style={{ marginTop:24, width:'100%', padding:'12px', borderRadius:'var(--radius-md)', background:'linear-gradient(135deg, var(--col-accent) 0%, #0ea5e9 100%)', color:'#020c16', fontWeight:700 }}>Применить стили</button>

          {showProAlert && (
            <ModalOverlay onClose={()=>setShowProAlert(false)}>
              <div style={{ textAlign:'center' }}>
                <h3 style={{ fontSize:20, marginBottom:10 }}>Разблокировать Режим nFactorial PRO? 💎</h3>
                <p style={{ color:T.muted, fontSize:13, marginBottom:20 }}>Получите премиальные формы фишек, золотые доски и эксклюзивные скины для судей хакатона.</p>
                <button onClick={()=>setShowProAlert(false)} style={{ width:'100%', padding:12, borderRadius:'var(--radius-md)', background:'linear-gradient(135deg, #ff9900, #ff5500)', color:'white', fontWeight:700, marginBottom:10 }}>Купить подписку</button>
                <button onClick={()=>setShowProAlert(false)} style={{ width:'100%', padding:12, borderRadius:'var(--radius-md)', border:`1px solid ${T.border}`, color:T.text, fontWeight:600 }}>Активировать демо-режим 🚀</button>
              </div>
            </ModalOverlay>
          )}
        </ModalOverlay>
      );
    }

    function LeaderboardModal({ onClose }) {
      const lb = loadLB();
      const sorted = Object.entries(lb).sort((a,b)=>b[1]-a[1]);
      const medals = ['🥇','🥈','🥉'];

      return (
        <ModalOverlay onClose={onClose}>
          <div style={{ marginBottom:24 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
              <span style={{ fontSize:28 }}>🏆</span>
              <h2 style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:800, color:T.text }}>Leaderboard</h2>
            </div>
            <p style={{ color:T.muted, fontSize:13 }}>Локальная статистика побед в сессии</p>
          </div>

          {sorted.length === 0 ? (

                    <button onClick={() => setOnlineAction('join')} style={{ width:'100%', padding:12, borderRadius:'var(--radius-sm)', background:T.surfaceH, border:`1px solid ${T.border}`, color:T.text, fontWeight:700 }}>Войти по коду</button>

                    <button onClick={() => onStart({ mode: 3, isHost: true, p1Name, timerSec })} style={{ width:'100%', padding:12, borderRadius:'var(--radius-sm)', background: 'linear-gradient(135deg, var(--col-accent) 0%, #0ea5e9 100%)', color: '#020c16', fontWeight:700 }}>Открыть комнату</button>

                    <button onClick={() => onStart({ mode: 3, isHost: false, p1Name, roomCode, timerSec })} style={{ width:'100%', padding:12, borderRadius:'var(--radius-sm)', background: 'linear-gradient(135deg, var(--col-accent) 0%, #0ea5e9 100%)', color: '#020c16', fontWeight:700 }}>Подключиться</button>

            <div style={{ display:'flex', gap:10 }}>
              {mode !== 3 && (

    function AdvisorButton({ onAdvisor, used, disabled }) {
      const [hover, setHover] = useState(false);
      return (
        <button onClick={onAdvisor} disabled={disabled || used} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 20px', borderRadius:'var(--radius-md)', border: used ? `1px solid ${T.border}` : `1px solid ${hover?'var(--col-accent)':'rgba(56,189,248,0.35)'}`, background: used ? T.surface : hover ? 'rgba(56,189,248,0.12)' : 'rgba(56,189,248,0.06)', color: used ? T.dim : T.accent, fontWeight:700, fontSize:14, opacity: (disabled || used) ? 0.45 : 1, transition:'all 0.18s' }}>
          <span>{used ? '✓' : '💡'}</span>
          <span>{used ? 'Подсказка использована' : 'Попросить подсказку'}</span>

      );

    /* ═══════════════════════════════════════════════════════════════
       GAME SCREEN (NEW ADAPTIVE GRID FOR PC/DESKTOP)
    ════════════════════════════════════════════════════════════════ */
    function GameScreen({ config, onMenu }) {
      const { mode, p1Name, p2Name, timerSec } = config;
      
      const [board, setBoard]       = useState(makeBoard());
      const [current, setCurrent]   = useState(P1);
      const [winInfo, setWinInfo]   = useState(null);
      const [drawGame, setDrawGame] = useState(false);
      const [newCell, setNewCell]   = useState(null);
      const [hoverCol, setHoverCol] = useState(null);
      const [advisorCol, setAdvisorCol]   = useState(null);
      const [advisorUsed, setAdvisorUsed] = useState(false);
      const [timerLeft, setTimerLeft] = useState(timerSec);
      const [showLB, setShowLB]         = useState(false);
      const [showPostGame, setShowPostGame] = useState(false);
      const [moveCount, setMoveCount]   = useState(0);
      const [gameStart]   = useState(Date.now());
      const [p1Times, setP1Times] = useState([]);
      const [p2Times, setP2Times] = useState([]);
      const [turnStart, setTurnStart] = useState(Date.now());
      const [gameOver, setGameOver]   = useState(false);
      
      // Multiplayer state fields
      const [syncRoomCode, setSyncRoomCode] = useState('');
      const [onlineNames, setOnlineNames] = useState({ p1: p1Name, p2: mode === 3 ? 'Ожидание игрока...' : p2Name });
      const [myRole, setMyRole] = useState(P1); // P1 or P2 for online clients

      const timerRef    = useRef(null);
      const botTimeout  = useRef(null);
      const docRoomRef  = useRef(null);

      const p2Label = mode === 3 ? onlineNames.p2 : (mode === 2 ? p2Name : 'Bot');
      const p2Token = mode === 1 ? BOT : P2;
      const isBotTurn = mode === 1 && current === BOT;

      // ── MULTIPLAYER FIREBASE REALTIME CONNECTOR ──
      useEffect(() => {
        if (mode !== 3 || !db) return;

        if (config.isHost) {
          const code = Math.floor(1000 + Math.random() * 9000).toString();
          setSyncRoomCode(code);
          setMyRole(P1);

          const roomRef = db.collection('rooms').doc(code);
          docRoomRef.current = roomRef;

          roomRef.set({
            board: makeBoard(),
            current: P1,
            p1Name: p1Name,
            p2Name: 'Ожидание подключения...',
            moveCount: 0,
            gameOver: false,
            winner: null,
            isDraw: false
          });

          const unsub = roomRef.onSnapshot(doc => {
            if (doc.exists()) {
              const d = doc.data();
              setBoard(d.board);
              setCurrent(d.current);
              setOnlineNames({ p1: d.p1Name, p2: d.p2Name });
              setMoveCount(d.moveCount);
              setGameOver(d.gameOver);
              if (d.gameOver) {
                if (d.winner) setWinInfo({ winner: d.winner, cells: d.winCells || [] });
                if (d.isDraw) setDrawGame(true);
                setShowPostGame(true);
              }
            }
          });
          return () => unsub();
        } else {
          // Guest player joining
          const code = config.roomCode;
          setSyncRoomCode(code);
          setMyRole(P2);

          const roomRef = db.collection('rooms').doc(code);
          docRoomRef.current = roomRef;

          roomRef.update({ p2Name: p1Name });

          const unsub = roomRef.onSnapshot(doc => {
            if (doc.exists()) {
              const d = doc.data();
              setBoard(d.board);
              setCurrent(d.current);
              setOnlineNames({ p1: d.p1Name, p2: d.p2Name });
              setMoveCount(d.moveCount);
              setGameOver(d.gameOver);
              if (d.gameOver) {
                if (d.winner) setWinInfo({ winner: d.winner, cells: d.winCells || [] });
                if (d.isDraw) setDrawGame(true);
                setShowPostGame(true);
              }
            }
          });
          return () => unsub();
        }
      }, [config]);

      // State persistence (Local matches only)
      useEffect(() => {
        if (mode === 3 || gameOver) { localStorage.removeItem(STORAGE_KEY); return; }
        const s = { board, current, p1Name, p2Name, timerSec, timerLeft, moveCount, p1Times, p2Times, mode, turnStart: Date.now() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
      }, [board, current, timerLeft]);

      // Turn countdown timer
      useEffect(() => {
        if (gameOver) return;
        clearInterval(timerRef.current);
        setTimerLeft(timerSec);
        setTurnStart(Date.now());
        timerRef.current = setInterval(() => {
          setTimerLeft(prev => {
            if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return timerSec; }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [current, gameOver]);

      // Offline bot trigger
      useEffect(() => {
        if (!isBotTurn || gameOver) return;
        botTimeout.current = setTimeout(() => {
          doMove(getBotMove(board, BOT), BOT);
        }, 800);
        return () => clearTimeout(botTimeout.current);
      }, [current, gameOver]);

      function handleTimeout() {
        if (mode === 3) return; // Disable timeout turnovers for simplified online stability
        const el = Math.round((Date.now()-turnStart)/1000);
        if (current===P1) setP1Times(p=>[...p,el]); else setP2Times(p=>[...p,el]);
        setAdvisorCol(null); setAdvisorUsed(false);
        setCurrent(current===P1 ? p2Token : P1);
      }

      function doMove(col, player) {
        if (!isValidCol(board, col)) return;

        // Block move action if online and it isn't your designated client turn
        if (mode === 3) {
          if (current === P1 && myRole !== P1) return;
          if (current === P2 && myRole !== P2) return;
        }

        clearInterval(timerRef.current); clearTimeout(botTimeout.current);
        const row = getDropRow(board, col);
        const next = dropPiece(board, col, player);
        if (!next) return;

        const nextTurn = player === P1 ? p2Token : P1;
        const newMoves = moveCount + 1;

        const win = checkWinner(next);
        const draw = !win && isDraw(next);

        if (mode === 3 && docRoomRef.current) {
          // Cloud update for online database states
          docRoomRef.current.update({
            board: next,
            current: nextTurn,
            moveCount: newMoves,
            gameOver: !!(win || draw),
            winner: win ? player : null,
            winCells: win ? win.cells : null,
            isDraw: draw
          });
        } else {
          // Local component state updates
          setBoard(next);
          setNewCell([row, col]);
          setMoveCount(newMoves);
          const el = Math.round((Date.now()-turnStart)/1000);
          if (player===P1) setP1Times(p=>[...p,el]); else setP2Times(p=>[...p,el]);
          setAdvisorCol(null); setAdvisorUsed(false);
          setTimeout(() => setNewCell(null), 450);

          if (win) {
            setWinInfo(win); setGameOver(true);
            addWin(player===P1 ? p1Name : p2Label);
            setTimeout(() => setShowPostGame(true), 950);
            return;
          }
          if (draw) { setDrawGame(true); setGameOver(true); setTimeout(()=>setShowPostGame(true),500); return; }
          setCurrent(nextTurn);
        }
      }

      function handleColClick(col) {
        if (gameOver || isBotTurn || !isValidCol(board, col)) return;
        doMove(col, current);
      }
      function handleAdvisor() {
        if (gameOver || isBotTurn || advisorUsed) return;
        setAdvisorCol(getAdvisorCol(board, current));
        setAdvisorUsed(true);
      }
      function handleRematch() {
        if (mode === 3 && docRoomRef.current) {
          docRoomRef.current.update({
            board: makeBoard(), current: P1, moveCount: 0, gameOver: false, winner: null, isDraw: false
          });
          return;
        }
        setBoard(makeBoard()); setCurrent(P1); setWinInfo(null); setDrawGame(false);
        setNewCell(null); setAdvisorCol(null); setAdvisorUsed(false); setMoveCount(0);
        setP1Times([]); setP2Times([]); setShowPostGame(false); setGameOver(false); setTimerLeft(timerSec);
      }

      const curColor = playerColor(current);
      const cellPx = 'min(calc((min(100vw,520px) - 56px) / 7), 64px)';
      const sortedLB = Object.entries(loadLB()).sort((a,b)=>b[1]-a[1]).slice(0,3);

      return (
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', padding:'20px 12px 32px', position:'relative' }}>
          
          {/* ── Top Nav Bar ── */}
          <div style={{ width:'100%', maxWidth:1200, display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20, borderBottom:'1px solid var(--col-border)', paddingBottom:12 }}>
            <button onClick={onMenu} style={{ padding:'8px 14px', borderRadius:'var(--radius-sm)', border:'1px solid var(--col-border)', background:T.surface, color:T.muted, fontSize:13, fontWeight:600 }}>← Menu</button>
            <h1 style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:20, color:T.text }}>Connect Four</h1>
            
            {mode === 3 ? (
              <div className="pro-badge" style={{ background: '#10b981', padding:'6px 12px', fontSize:12 }}>Код комнаты: {syncRoomCode}</div>
            ) : (
              <button onClick={() => setShowLB(true)} style={{ padding:'8px 14px', borderRadius:'var(--radius-sm)', border:`1px solid rgba(251,191,36,0.3)`, background:'rgba(251,191,36,0.06)', color:T.p2, fontSize:13, fontWeight:700 }}>🏆 Board</button>
            )}
          </div>

          {/* ── RESPONSIVE PC LAYOUT GRID WRAPPER ── */}
          <div className="game-layout-container">
            
            {/* LEFT SIDE PANEL: Scorecards and Turn metrics */}
            <div className="side-column" style={{ display: 'none' }}>
              <div style={{ background:'rgba(12,17,32,0.6)', border:'1px solid var(--col-border)', borderRadius:'var(--radius-md)', padding:16 }}>
                <h3 style={{ fontSize:11, color:T.muted, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:12 }}>Участники</h3>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  <PlayerCard name={mode===3 ? onlineNames.p1 : p1Name} color={T.p1} active={current===P1 && !gameOver} />
                  <PlayerCard name={p2Label} color={mode===2 ? T.p2 : T.bot} active={current!==P1 && !gameOver} right />
                </div>
              </div>

              {!gameOver && mode !== 3 && (
                <div style={{ background:'rgba(12,17,32,0.6)', border:'1px solid var(--col-border)', borderRadius:'var(--radius-md)', padding:16 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:curColor }}>{isBotTurn?'Бот думает...':'Ваш ход'}</span>
                    <span style={{ fontSize:12, color:T.muted }}>{timerLeft}s</span>
                  </div>
                  <TimerBar seconds={timerLeft} max={timerSec} />
                </div>
              )}
            </div>

            {/* MAIN CORE INTERFACE PANEL: Game Board Arena */}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
              {/* Mobile Player cards view backup (hidden on wide laptop screens) */}
              <div className="mobile-only-cards" style={{ width:'100%', display:'flex', gap:10, marginBottom:14 }}>
                <PlayerCard name={mode===3 ? onlineNames.p1 : p1Name} color={T.p1} active={current===P1 && !gameOver} />
                <PlayerCard name={p2Label} color={mode===2 ? T.p2 : T.bot} active={current!==P1 && !gameOver} right />
              </div>

              <div style={{ width:'100%', background:'linear-gradient(160deg, #0e1f3d 0%, #091628 100%)', borderRadius:'var(--radius-xl)', padding:'14px 14px 10px', border:'2px solid var(--col-board-rim)', boxShadow:'0 24px 64px rgba(0,0,0,0.7)', position:'relative' }} onMouseLeave={() => setHoverCol(null)}>
                
                {/* Column Drop Arrow Indicators */}
                <div style={{ display:'grid', gridTemplateColumns:`repeat(${COLS},1fr)`, gap:6, marginBottom:6, height:16 }}>
                  {Array(COLS).fill(0).map((_,c) => {
                    const isAdvisor = advisorCol===c;
                    const isHov = hoverCol===c && !isBotTurn && !gameOver && isValidCol(board,c);
                    return (
                      <div key={c} style={{ display:'flex', justifyContent:'center', alignItems:'center', position:'relative' }}>
                        {(isAdvisor || isHov) && (
                          <div style={{ width:10, height:10, borderRadius:'50%', background: isAdvisor ? T.accent : curColor, boxShadow: isAdvisor ? `0 0 10px ${T.accent}` : `0 0 8px ${curColor}`, animation: 'colHoverBounce 0.6s ease-in-out infinite' }} />
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Rows and Grid System mapping */}
                {board.map((row, r) => (
                  <div key={r} style={{ display:'grid', gridTemplateColumns:`repeat(${COLS},1fr)`, gap:6, marginBottom: r<ROWS-1 ? 6 : 0 }}>
                    {row.map((cell, c) => {
                      const isWinCell = winInfo?.cells.some(([wr,wc])=>wr===r&&wc===c);
                      const isNew = newCell?.[0]===r && newCell?.[1]===c;
                      return (
                        <div key={c} onClick={() => handleColClick(c)} onMouseEnter={() => setHoverCol(c)} style={{ borderRadius:'var(--radius-sm)', padding:3, background: hoverCol===c && !isBotTurn && !gameOver && isValidCol(board,c) ? 'rgba(255,255,255,0.04)' : 'transparent' }}>
                          <Piece player={cell} isNew={isNew} isWinner={isWinCell} />
                        </div>
                      );
                    })}
                  </div>
                ))}
                <div style={{ marginTop:10, textAlign:'center', color:'rgba(255,255,255,0.08)', fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase', fontWeight:700, fontFamily:'var(--font-display)' }}>Connect Four</div>
              </div>

              {/* Bottom Gameplay Context Controls */}
              <div style={{ marginTop:16, display:'flex', gap:10, alignItems:'center', justifyContent:'center' }}>
                {!gameOver && !isBotTurn && mode !== 3 && (
                  <AdvisorButton onAdvisor={handleAdvisor} used={advisorUsed} disabled={gameOver||isBotTurn} />
                )}
                {gameOver && (
                  <>
                    <button onClick={handleRematch} style={{ padding:'10px 24px', borderRadius:'var(--radius-md)', background:`linear-gradient(135deg, ${T.accent} 0%, #0ea5e9 100%)`, color:'#020c16', fontWeight:800, fontSize:14 }}>Реванш</button>
                    <button onClick={onMenu} style={{ padding:'10px 24px', borderRadius:'var(--radius-md)', border:`1px solid ${T.borderHi}`, background:T.surface, color:T.text, fontWeight:600, fontSize:14 }}>В Меню</button>
                  </>
                )}
              </div>
            </div>

            {/* RIGHT SIDE PANEL: Dashboard Info / Embedded Stats Embed */}
            <div className="side-column" style={{ display: 'none' }}>
              <div style={{ background:'rgba(12,17,32,0.6)', border:'1px solid var(--col-border)', borderRadius:'var(--radius-md)', padding:16 }}>
                <h3 style={{ fontSize:11, color:T.muted, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:12 }}>🏆 Топ Сессии</h3>
                {sortedLB.length === 0 ? (
                  <p style={{ fontSize:12, color:T.dim }}>Пока нет сыгранных матчей.</p>
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                    {sortedLB.map(([name, wins], idx) => (
                      <div key={name} style={{ display:'flex', justifyContent:'space-between', padding:'6px 8px', background:'rgba(255,255,255,0.02)', borderRadius:6, fontSize:13 }}>
                        <span style={{ color:T.text, overflow:'hidden', textOverflow:'ellipsis' }}>{idx+1}. {name}</span>
                        <span style={{ fontWeight:700, color:T.accent }}>{wins} П</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{ color:T.dim, fontSize:11, fontFamily:'var(--font-mono)', paddingLeft:4 }}>
                ХОД #{moveCount} · {Math.round((Date.now()-gameStart)/1000)}с в игре
              </div>
            </div>

          </div>

          {/* Fallback Mobile responsive CSS controller toggle */}
          <style dangerouslySetInnerHTML={{__html: `
            @media (min-width: 1024px) {
              .mobile-only-cards { display: none !important; }
            }
          `}} />

          {/* Modals and Overlays controllers */}
          {showLB && <LeaderboardModal onClose={() => setShowLB(false)} />}
          {showPostGame && (
            <PostGameModal
              stats={{
                winner: winInfo?.winner,
                isDraw: drawGame,
                moves: moveCount,
                elapsed: Math.round((Date.now()-gameStart)/1000),
                p1Name, p2Name: p2Label, p1Times, p2Times, mode
              }}
              onRematch={handleRematch}
              onMenu={() => { setShowPostGame(false); onMenu(); }}
            />
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       ROOT APP
    ════════════════════════════════════════════════════════════════ */
    function App() {
      const [screen, setScreen]     = useState('setup');
      const [gameConfig, setConfig] = useState(null);
      const [savedGame, setSaved]   = useState(null);

      useEffect(() => {
        try { const r=localStorage.getItem(STORAGE_KEY); if(r) setSaved(JSON.parse(r)); } catch {}
      }, []);

      function handleStart(cfg, resume=false) {
        if (resume && savedGame) {
          setConfig({ mode:savedGame.mode, p1Name:savedGame.p1Name, p2Name:savedGame.p2Name, timerSec:savedGame.timerSec, resumeState:savedGame });
        } else {
          setConfig(cfg); setSaved(null);
        }
        setScreen('game');
      }
      function handleMenu() {
        setScreen('setup'); setConfig(null);
        try { const r=localStorage.getItem(STORAGE_KEY); if(r) setSaved(JSON.parse(r)); } catch {}
      }

      return (
        screen==='setup'
          ? <SetupScreen onStart={handleStart} savedGame={savedGame} />
          : <GameScreen config={gameConfig} onMenu={handleMenu} />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
